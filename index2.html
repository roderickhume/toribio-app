<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Toribio Pro | Estadio Virtual</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: #f8fafc; 
            margin: 0; padding: 0;
            overflow-x: hidden;
        }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .match-card { transition: transform 0.2s ease; }
        .match-card:active { transform: scale(0.98); }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-content { animation: slideUp 0.4s ease-out forwards; }
        
        .status-badge {
            font-size: 9px;
            font-weight: 900;
            padding: 2px 8px;
            border-radius: 6px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const apiKey = ""; // La key se inyecta automáticamente
        const appId = "toribio-ultimate-v6";

        const App = () => {
            const [view, setView] = useState('inicio'); 
            const [data, setData] = useState({ leagues: [] });
            const [loading, setLoading] = useState(true);
            const [weekOffset, setWeekOffset] = useState(0); 
            const [error, setError] = useState(null);

            const fetchSportsData = useCallback(async (offset) => {
                setLoading(true);
                setError(null);
                
                try {
                    const today = new Date();
                    const startOfWeek = new Date(today);
                    startOfWeek.setDate(today.getDate() + (offset * 7));
                    
                    const dateDisplay = startOfWeek.toLocaleDateString('es-CL', { month: 'long', year: 'numeric' });
                    const fullDateStr = startOfWeek.toISOString().split('T')[0];

                    const systemPrompt = `Eres un experto en periodismo deportivo. Proporciona datos de fútbol REALES para la semana del ${fullDateStr}. 
                    Rango solicitado: 2 meses atrás hasta 2 meses adelante.
                    Ligas: Primera División Chile, Primera B Chile, LaLiga, Premier League, Champions League.
                    
                    INSTRUCCIONES CRÍTICAS:
                    1. Para fechas PASADAS (anteriores a hoy): Muestra resultados reales (ej: 2-1). Status: "FINAL".
                    2. Para HOY: Muestra partidos en vivo o por jugar. Status: "LIVE" o "SCHEDULED".
                    3. Para fechas FUTURAS (hasta 2 meses): Muestra partidos programados con hora. Status: "SCHEDULED".
                    4. Si no hay partidos esa semana específica, busca los más cercanos en ese mes.
                    
                    Responde solo JSON con esta estructura:
                    {
                      "leagues": [
                        {
                          "name": "Nombre Liga",
                          "matches": [
                            {"home": "Equipo A", "away": "Equipo B", "score": "0-0", "time": "20:00", "date": "Lunes 10", "status": "FINAL/LIVE/SCHEDULED"}
                          ],
                          "top_team": "Equipo Líder"
                        }
                      ]
                    }`;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Dame los partidos de la semana de ${fullDateStr}.` }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            tools: [{ "google_search": {} }]
                        })
                    });

                    const result = await response.json();
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text || "";
                    const jsonMatch = text.match(/\{[\s\S]*\}/);
                    
                    if (jsonMatch) {
                        setData(JSON.parse(jsonMatch[0]));
                    } else {
                        throw new Error("Formato de datos inválido");
                    }
                } catch (err) {
                    console.error(err);
                    setError("No se pudieron cargar los datos. Reintentando...");
                } finally {
                    setLoading(false);
                }
            }, []);

            useEffect(() => {
                fetchSportsData(weekOffset);
            }, [weekOffset, fetchSportsData]);

            return (
                <div className="flex flex-col min-h-screen max-w-md mx-auto bg-[#020617] text-slate-100 pb-24">
                    {/* Header */}
                    <header className="p-6 glass sticky top-0 z-50 flex justify-between items-center border-b border-white/5">
                        <div>
                            <h1 className="text-xl font-black italic tracking-tighter">TORIBIO <span className="text-indigo-500">PRO</span></h1>
                            <p className="text-[9px] font-bold text-slate-500 uppercase tracking-widest leading-none mt-1">Multi-Temporal Data v6</p>
                        </div>
                        <div className="flex items-center gap-2">
                            {loading && <div className="w-2 h-2 bg-indigo-500 rounded-full animate-ping"></div>}
                            <i className="fa-solid fa-satellite-dish text-indigo-400 text-sm"></i>
                        </div>
                    </header>

                    {/* Selector de Tiempo mejorado */}
                    <div className="px-6 py-4">
                        <div className="flex items-center justify-between bg-slate-900/50 p-2 rounded-2xl border border-white/5">
                            <button 
                                onClick={() => setWeekOffset(v => v - 1)}
                                className="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center hover:bg-white/10"
                            >
                                <i className="fa-solid fa-arrow-left text-xs"></i>
                            </button>
                            
                            <div className="text-center">
                                <span className="text-[10px] font-black text-indigo-400 uppercase tracking-widest block">Periodo</span>
                                <span className="text-xs font-bold">
                                    {weekOffset === 0 ? "Esta Semana" : 
                                     weekOffset > 0 ? `En ${weekOffset} semanas` : 
                                     `Hace ${Math.abs(weekOffset)} semanas`}
                                </span>
                            </div>

                            <button 
                                onClick={() => setWeekOffset(v => v + 1)}
                                className="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center hover:bg-white/10"
                            >
                                <i className="fa-solid fa-arrow-right text-xs"></i>
                            </button>
                        </div>
                    </div>

                    {/* Contenido Principal */}
                    <main className="px-6 space-y-6">
                        {loading ? (
                            <div className="space-y-4 py-10 text-center">
                                <div className="w-12 h-12 border-4 border-indigo-500/20 border-t-indigo-500 rounded-full animate-spin mx-auto"></div>
                                <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Sincronizando con satélite...</p>
                            </div>
                        ) : error ? (
                            <div className="p-8 text-center bg-red-500/10 rounded-3xl border border-red-500/20">
                                <i className="fa-solid fa-triangle-exclamation text-red-500 mb-4 text-2xl"></i>
                                <p className="text-xs font-bold text-red-200">{error}</p>
                                <button onClick={() => fetchSportsData(weekOffset)} className="mt-4 px-6 py-2 bg-red-500 text-white rounded-xl text-[10px] font-black uppercase">Reintentar</button>
                            </div>
                        ) : (
                            data.leagues.map((league, idx) => (
                                <section key={idx} className="animate-content">
                                    <div className="flex items-center justify-between mb-3 px-1">
                                        <h2 className="text-[11px] font-black uppercase tracking-widest text-slate-400">
                                            <i className="fa-solid fa-trophy text-indigo-500 mr-2"></i>
                                            {league.name}
                                        </h2>
                                        <span className="text-[9px] font-bold text-indigo-400/60">Líder: {league.top_team}</span>
                                    </div>
                                    
                                    <div className="space-y-3">
                                        {league.matches.map((match, midx) => (
                                            <div key={midx} className="match-card glass p-4 rounded-[24px] border border-white/5">
                                                <div className="flex justify-between items-center mb-3">
                                                    <span className="text-[9px] font-black text-slate-500 uppercase">{match.date}</span>
                                                    <span className={`status-badge ${
                                                        match.status === 'FINAL' ? 'bg-slate-800 text-slate-400' :
                                                        match.status === 'LIVE' ? 'bg-red-500 text-white animate-pulse' :
                                                        'bg-indigo-600 text-white'
                                                    }`}>
                                                        {match.status}
                                                    </span>
                                                </div>
                                                
                                                <div className="flex items-center justify-between gap-2">
                                                    <div className="flex-1 text-right text-xs font-bold truncate">{match.home}</div>
                                                    
                                                    <div className="flex flex-col items-center min-w-[70px]">
                                                        <div className="text-lg font-black tracking-tighter bg-slate-950 px-3 py-1 rounded-xl border border-white/5">
                                                            {match.status === 'SCHEDULED' ? match.time : (match.score || 'vs')}
                                                        </div>
                                                    </div>
                                                    
                                                    <div className="flex-1 text-left text-xs font-bold truncate">{match.away}</div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            ))
                        )}
                        
                        {!loading && data.leagues.length === 0 && (
                            <div className="py-20 text-center">
                                <i className="fa-solid fa-calendar-xmark text-4xl text-slate-800 mb-4"></i>
                                <p className="text-xs font-bold text-slate-500 uppercase tracking-widest">No hay partidos registrados en este periodo</p>
                            </div>
                        )}
                    </main>

                    {/* Tab Bar */}
                    <nav className="fixed bottom-6 left-6 right-6 h-16 glass rounded-2xl flex justify-around items-center border border-white/10 shadow-2xl shadow-black/50 z-50">
                        <button onClick={() => setView('inicio')} className={`flex flex-col items-center gap-1 ${view === 'inicio' ? 'text-indigo-500' : 'text-slate-500'}`}>
                            <i className="fa-solid fa-futbol text-lg"></i>
                            <span className="text-[8px] font-black uppercase">Partidos</span>
                        </button>
                        <button onClick={() => setView('hoy')} className={`flex flex-col items-center gap-1 ${view === 'hoy' ? 'text-indigo-500' : 'text-slate-500'}`}>
                            <i className="fa-solid fa-clock text-lg"></i>
                            <span className="text-[8px] font-black uppercase">En Vivo</span>
                        </button>
                        <button onClick={() => setWeekOffset(0)} className="w-12 h-12 bg-indigo-600 rounded-full -mt-10 border-4 border-[#020617] flex items-center justify-center text-white shadow-lg shadow-indigo-500/20 active:scale-90 transition-transform">
                            <i className="fa-solid fa-house"></i>
                        </button>
                        <button onClick={() => setView('favs')} className={`flex flex-col items-center gap-1 ${view === 'favs' ? 'text-indigo-500' : 'text-slate-500'}`}>
                            <i className="fa-solid fa-star text-lg"></i>
                            <span className="text-[8px] font-black uppercase">Favs</span>
                        </button>
                        <button onClick={() => setView('rank')} className={`flex flex-col items-center gap-1 ${view === 'rank' ? 'text-indigo-500' : 'text-slate-500'}`}>
                            <i className="fa-solid fa-chart-simple text-lg"></i>
                            <span className="text-[8px] font-black uppercase">Rank</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
