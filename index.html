<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Toribio App | Fútbol Total</title>
    
    <style>
        :root {
            --bg: #020617;
            --primary: #4f46e5;
            --card: #1e293b;
            --accent: #10b981;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: white;
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; flex-direction: column; min-height: 100vh;
        }

        header {
            padding: 20px; background: rgba(2, 6, 23, 0.95);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }

        .logo { font-weight: 900; font-style: italic; font-size: 1.2rem; }
        .logo span { color: var(--primary); }

        main { padding: 20px; flex: 1; max-width: 600px; margin: 0 auto; width: 100%; }

        .hero {
            background: linear-gradient(135deg, #4f46e5, #3730a3);
            padding: 30px; border-radius: 30px; margin-bottom: 25px;
            position: relative; overflow: hidden;
        }

        .hero h1 { margin: 0; font-size: 1.5rem; font-weight: 900; font-style: italic; text-transform: uppercase; }

        .btn-update {
            background: white; color: var(--primary); border: none;
            padding: 12px 20px; border-radius: 15px; font-weight: 900;
            font-size: 0.7rem; margin-top: 15px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .section-title {
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px;
            color: var(--text-dim); margin: 25px 0 15px 0; display: block; font-weight: 900;
        }

        .match-card {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 20px; border-radius: 25px; margin-bottom: 15px;
        }

        .match-data { font-size: 0.9rem; line-height: 1.6; white-space: pre-wrap; }
        
        .loading-overlay {
            position: fixed; inset: 0; background: rgba(2,6,23,0.8);
            display: none; flex-direction: column; align-items: center;
            justify-content: center; z-index: 200; backdrop-filter: blur(5px);
        }

        .spinner {
            width: 40px; height: 40px; border: 4px solid #1e293b;
            border-top-color: var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        nav {
            background: #0f172a; padding: 15px 30px; display: flex;
            justify-content: space-around; position: sticky; bottom: 0;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .nav-link { color: var(--text-dim); text-decoration: none; font-size: 0.6rem; font-weight: 900; }
        .nav-link.active { color: var(--primary); }
    </style>
</head>
<body>

    <div id="loader" class="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top: 15px; font-weight: 800; font-size: 0.7rem; letter-spacing: 2px;">ACTUALIZANDO MARCADORES...</p>
    </div>

    <header>
        <div class="logo">TORIBIO<span>APP</span></div>
        <div style="width: 10px; height: 10px; background: #10b981; border-radius: 50%;"></div>
    </header>

    <main>
        <div class="hero">
            <h1 id="city-title">SANTIAGO, CHILE</h1>
            <p id="current-date" style="font-size: 0.7rem; opacity: 0.7; margin: 5px 0 15px 0;"></p>
            <button class="btn-update" onclick="updateFootballData()">Actualizar Marcadores</button>
        </div>

        <div id="results-sections">
            <div id="chile-results">
                <span class="section-title">Chile: Campeonato Nacional</span>
                <div class="match-card" style="text-align: center; color: var(--text-dim);">
                    Cargando última fecha...
                </div>
            </div>

            <div id="europe-results">
                <span class="section-title">Europa: Ligas Principales</span>
                <div class="match-card" style="text-align: center; color: var(--text-dim);">
                    Cargando Champions/Ligas...
                </div>
            </div>
        </div>
    </main>

    <nav>
        <a href="#" class="nav-link active">INICIO</a>
        <a href="#" class="nav-link">LIGAS</a>
        <a href="#" class="nav-link">TABLA</a>
    </nav>

    <script>
        const apiKey = ""; // La API key se inyecta automáticamente

        async function getGroundingData(query, targetId) {
            const container = document.getElementById(targetId);
            const systemPrompt = "Eres un analista deportivo. Busca resultados REALES de la fecha actual. Formato: 'Equipo A [Marcador] Equipo B'. Si no hay partidos hoy, muestra los de ayer. Sé breve y directo.";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: query }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        tools: [{ "google_search": {} }]
                    })
                });

                const result = await response.json();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text || "No se encontraron datos.";
                
                container.innerHTML = `
                    <div class="match-card">
                        <div class="match-data">${text}</div>
                    </div>
                `;

            } catch (error) {
                container.innerHTML = '<div class="match-card" style="color: #ef4444;">Error al cargar.</div>';
            }
        }

        async function updateFootballData() {
            const loader = document.getElementById('loader');
            loader.style.display = 'flex';

            // Ejecutamos ambas búsquedas en paralelo
            await Promise.all([
                getGroundingData("resultados ultima fecha campeonato nacional chile hoy ayer 2026", "chile-results"),
                getGroundingData("resultados hoy champions league premier league laliga europa", "europe-results")
            ]);

            loader.style.display = 'none';
        }

        // Carga inicial al abrir
        window.onload = () => {
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('es-CL', { weekday: 'long', day: 'numeric', month: 'long' });
            updateFootballData();
        };
    </script>

</body>
</html>
