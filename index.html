<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Toribio Pro | Detalle CL v9.1</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; padding: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
.glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
.match-card { transition: all 0.2s ease; cursor: pointer; }
.match-card:active { transform: scale(0.98); background: rgba(30, 41, 59, 0.6); }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
.loading-shimmer { background: linear-gradient(90deg, #0f172a 25%, #1e293b 50%, #0f172a 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
.modal-enter-active { animation: modalFade 0.3s ease-out; }
@keyframes modalFade { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const App = () => {
const [data, setData] = useState(null);
const [loading, setLoading] = useState(true);
const [selectedTab, setSelectedTab] = useState("hoy");
const [selectedMatch, setSelectedMatch] = useState(null);
const [favorites, setFavorites] = useState([]);
const [toast, setToast] = useState("");
const [error, setError] = useState("");
const [showStats, setShowStats] = useState(false);
const [statsData, setStatsData] = useState(null);
const [statsLoading, setStatsLoading] = useState(false);
const toggleFavorite = (matchId) => {
setFavorites(prev => {
const isFav = prev.includes(matchId);
setToast(isFav ? "Eliminado de favoritos." : "Añadido a favoritos.");
setTimeout(() => setToast(""), 2000);
return isFav ? prev.filter(id => id !== matchId) : [...prev, matchId];
});
};
const fetchData = async (tab) => {
setLoading(true);
setError("");
let prompt = "";
if (tab === "anteriores") {
prompt = `JSON ONLY. Solo partidos de fútbol profesional en CHILE de los últimos 7 días (desde hace 7 días hasta ayer). Categorizar obligatoriamente por división: Primera División, Segunda División y Tercera División. Formato exacto: {"leagues": [{"name": "Primera División", "matches": [...]}, {"name": "Segunda División", "matches": [...]}, {"name": "Tercera División", "matches": [...]}]}. Si no hay partidos en una división poner array vacío [].`;
} else if (tab === "siguientes") {
prompt = `JSON ONLY. Solo partidos de fútbol profesional en CHILE de los próximos 7 días (desde mañana hasta dentro de 7 días). Categorizar obligatoriamente por división: Primera División, Segunda División y Tercera División. Formato exacto: {"leagues": [{"name": "Primera División", "matches": [...]}, {"name": "Segunda División", "matches": [...]}, {"name": "Tercera División", "matches": [...]}]}. Si no hay partidos en una división poner array vacío [].`;
} else {
prompt = `JSON ONLY. Solo partidos de fútbol profesional en CHILE de HOY (fecha actual). Incluir también los partidos que están en vivo. Categorizar obligatoriamente por división: Primera División, Segunda División y Tercera División. Formato exacto: {"leagues": [{"name": "Primera División", "matches": [...]}, {"name": "Segunda División", "matches": [...]}, {"name": "Tercera División", "matches": [...]}]}. Si no hay partidos responder {"leagues": []}`;
}
try {
const response = await fetch('/api/gemini', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({
contents: [{ parts: [{ text: prompt }] }],
tools: [{ "google_search": {} }]
})
});
const result = await response.json();
const rawText = result.candidates?.[0]?.content?.parts?.[0]?.text || "";
const start = rawText.indexOf('{');
const end = rawText.lastIndexOf('}');
const jsonData = start !== -1 ? JSON.parse(rawText.substring(start, end + 1)) : null;
if (jsonData && jsonData.leagues) setData(jsonData);
else {
setError("No se encontraron partidos para este período.");
setData({leagues:[]});
}
} catch (err) {
setError("Error al obtener datos en tiempo real.");
setData({leagues:[]});
} finally { setLoading(false); }
};
const fetchStats = async () => {
setStatsLoading(true);
const prompt = `JSON ONLY. Estadísticas actuales y ranking de equipos chilenos de fútbol profesional. Incluir Primera División, Segunda División y Tercera División. Formato exacto: {"leagues": [{"name": "Primera División", "standings": [{"position": number, "team": "String", "points": number, "played": number, "wins": number, "draws": number, "losses": number, "goalsFor": number, "goalsAgainst": number}]}, {"name": "Segunda División", "standings": [...]}, {"name": "Tercera División", "standings": [...]}]}`;
try {
const response = await fetch('/api/gemini', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({
contents: [{ parts: [{ text: prompt }] }],
tools: [{ "google_search": {} }]
})
});
const result = await response.json();
const rawText = result.candidates?.[0]?.content?.parts?.[0]?.text || "";
const start = rawText.indexOf('{');
const end = rawText.lastIndexOf('}');
const jsonData = start !== -1 ? JSON.parse(rawText.substring(start, end + 1)) : null;
if (jsonData && jsonData.leagues) setStatsData(jsonData);
else setStatsData({leagues:[]});
} catch (err) {
setStatsData({leagues:[]});
} finally { setStatsLoading(false); }
};
const openStats = () => {
setShowStats(true);
if (!statsData) fetchStats();
};
const resetToToday = () => {
setSelectedTab("hoy");
};
useEffect(() => { fetchData(selectedTab); }, [selectedTab]);
return (
<div className="flex flex-col min-h-screen max-w-md mx-auto bg-[#020617] pb-32">
<header className="p-5 flex justify-between items-center sticky top-0 z-50 glass border-b border-white/10">
<div className="flex items-center gap-3">
<div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20"><i className="fa-solid fa-futbol text-white text-lg"></i></div>
<div>
<h1 className="text-sm font-black tracking-tighter uppercase leading-none">Toribio <span className="text-indigo-400 font-extrabold">v9.1</span></h1>
<p className="text-[9px] font-bold text-emerald-500 tracking-wider mt-1 flex items-center gap-1.5 uppercase"><span className="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>En línea - Chile</p>
</div>
</div>
<button onClick={() => fetchData(selectedTab)} className={`p-2 rounded-full ${loading ? 'animate-spin text-indigo-400' : 'text-slate-400 active:bg-white/10'}`}><i className="fa-solid fa-rotate-right"></i></button>
</header>
<div className="p-4">
<div className="bg-slate-900/80 rounded-2xl flex items-center justify-around p-2 border border-white/5">
<button onClick={() => setSelectedTab("anteriores")} className={`px-4 py-2 rounded-xl text-xs font-bold transition-all ${selectedTab === "anteriores" ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-500/20' : 'text-slate-400 active:bg-white/10'}`}>Anteriores</button>
<button onClick={() => setSelectedTab("hoy")} className={`px-4 py-2 rounded-xl text-xs font-bold transition-all ${selectedTab === "hoy" ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-500/20' : 'text-slate-400 active:bg-white/10'}`}>Hoy</button>
<button onClick={() => setSelectedTab("siguientes")} className={`px-4 py-2 rounded-xl text-xs font-bold transition-all ${selectedTab === "siguientes" ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-500/20' : 'text-slate-400 active:bg-white/10'}`}>Siguientes</button>
</div>
</div>
<main className="px-4 space-y-8">
{loading ? [1,2,3].map(i => (
<div key={i} className="space-y-3">
<div className="h-3 w-24 bg-slate-800 rounded-full loading-shimmer"></div>
<div className="h-32 w-full rounded-[28px] bg-slate-900 loading-shimmer"></div>
</div>
)) : error ? (
<div className="text-center py-20 text-slate-400">
<i className="fa-solid fa-wifi-slash text-5xl mb-4 text-red-500"></i>
<p className="font-bold">{error}</p>
</div>
) : data && data.leagues && data.leagues.length > 0 ? data.leagues.map((league, idx) => (
<div key={idx} className="space-y-3">
<h2 className="text-[10px] font-black uppercase tracking-[0.25em] text-indigo-400/80 ml-2 flex items-center gap-2.5">
<div className="w-5 h-5 bg-indigo-600 rounded flex items-center justify-center text-[10px]"><i className="fa-solid fa-trophy"></i></div>
{league.name}
</h2>
{league.matches && league.matches.length > 0 ? league.matches.map((match, midx) => (
<div key={midx} className="match-card glass rounded-[28px] p-5 relative overflow-hidden group">
{match.status === 'LIVE' && <div className="absolute top-0 right-0 px-3 py-1 bg-red-600 text-[8px] font-black text-white rounded-bl-xl animate-pulse z-10">VIVO</div>}
<div className="flex justify-between items-center mb-4">
<span className="text-[10px] font-bold text-slate-500 uppercase tracking-tighter">{match.date}</span>
<button onClick={(e) => { e.stopPropagation(); toggleFavorite(match.id); }} className={`w-8 h-8 rounded-full flex items-center justify-center transition-colors ${favorites.includes(match.id) ? 'bg-amber-500 text-white' : 'text-slate-600 hover:text-white'}`}>
<i className={`fa-solid fa-star ${favorites.includes(match.id) ? '' : 'text-white/30'}`}></i>
</button>
</div>
<div className="flex items-center justify-between gap-4" onClick={() => setSelectedMatch({...match, leagueName: league.name})}>
<div className="flex-1 space-y-3">
<div className="flex justify-between items-center"><span className="text-sm font-bold text-slate-100">{match.home}</span><span className="text-sm font-black text-white">{match.status === 'SCHEDULED' ? '-' : match.score.split('-')[0]}</span></div>
<div className="flex justify-between items-center"><span className="text-sm font-bold text-slate-100">{match.away}</span><span className="text-sm font-black text-white">{match.status === 'SCHEDULED' ? '-' : match.score.split('-')[1]}</span></div>
</div>
<div className="w-[1px] h-10 bg-white/10"></div>
<div className="text-center min-w-[60px]">
<div className={`text-[11px] font-black py-1.5 rounded-lg border ${match.status === 'LIVE' ? 'text-red-400 bg-red-500/10 border-red-500/20' : 'text-indigo-400 bg-indigo-500/10 border-indigo-500/20'}`}>
{match.status === 'SCHEDULED' ? match.time : match.status}
</div>
</div>
</div>
</div>
)) : (
<div className="glass rounded-[28px] p-8 text-center">
<p className="text-slate-400 text-sm">No hay partidos programados en esta división para el período seleccionado.</p>
</div>
)}
</div>
)) : (
<div className="text-center py-20 text-slate-400">
<i className="fa-solid fa-futbol text-5xl mb-4 opacity-50"></i>
<p className="font-bold">No hay partidos de fútbol en Chile para este período.</p>
</div>
)}
</main>
<nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-sm h-16 glass rounded-[32px] flex justify-around items-center px-4 border border-white/10 shadow-2xl z-[100]">
<i onClick={resetToToday} className="fa-solid fa-house-chimney text-lg text-indigo-500 cursor-pointer"></i>
<i onClick={openStats} className="fa-solid fa-chart-simple text-lg text-slate-500 cursor-pointer"></i>
<div className="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center -mt-12 shadow-xl shadow-indigo-500/40 border-4 border-[#020617] active:scale-90 transition-transform"><i className="fa-solid fa-plus text-white text-xl"></i></div>
<div className="relative"><i className="fa-solid fa-star text-lg text-slate-500"></i>{favorites.length > 0 && <span className="absolute -top-1 -right-1.5 w-4 h-4 bg-amber-500 text-white text-[8px] font-black rounded-full flex items-center justify-center">{favorites.length}</span>}</div>
<i className="fa-solid fa-gear text-lg text-slate-500"></i>
</nav>
{selectedMatch && (
<div className="fixed inset-0 bg-black/80 flex items-center justify-center p-6 z-[200] modal-enter-active" onClick={() => setSelectedMatch(null)}>
<div className="bg-[#0f172a] rounded-[32px] w-full max-w-sm p-8 border border-white/10 shadow-2xl relative" onClick={e => e.stopPropagation()}>
<button onClick={() => setSelectedMatch(null)} className="absolute top-5 right-5 text-slate-500"><i className="fa-solid fa-xmark text-lg"></i></button>
<div className="text-center mb-8">
<div className="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-xl"><i className="fa-solid fa-shield-halved"></i></div>
<h3 className="text-[10px] font-black uppercase text-indigo-400 tracking-widest mb-1">{selectedMatch.leagueName}</h3>
<p className="text-xs font-bold text-slate-400">
{selectedMatch.date} • {selectedMatch.time}
</p>
</div>
<div className="space-y-6">
<div className="flex justify-between items-center text-sm font-bold text-white"><span>{selectedMatch.home}</span><span className="font-black text-lg text-indigo-400">{selectedMatch.status === 'SCHEDULED' ? '-' : selectedMatch.score.split('-')[0]}</span></div>
<div className="flex justify-between items-center text-sm font-bold text-white"><span>{selectedMatch.away}</span><span className="font-black text-lg text-indigo-400">{selectedMatch.status === 'SCHEDULED' ? '-' : selectedMatch.score.split('-')[1]}</span></div>
<div className="h-[1px] bg-white/10"></div>
<div className="space-y-3">
<p className="text-xs font-bold text-white"><i className="fa-solid fa-map-marker-alt text-indigo-400 mr-2"></i> {selectedMatch.location || 'Estadio por confirmar'}</p>
<p className="text-xs font-bold text-slate-400 ml-5">{selectedMatch.city || 'Ciudad por confirmar'}</p>
</div>
</div>
</div>
</div>
)}
{showStats && (
<div className="fixed inset-0 bg-black/80 flex items-center justify-center p-6 z-[200] modal-enter-active" onClick={() => setShowStats(false)}>
<div className="bg-[#0f172a] rounded-[32px] w-full max-w-sm max-h-[90vh] overflow-hidden border border-white/10 shadow-2xl relative" onClick={e => e.stopPropagation()}>
<button onClick={() => setShowStats(false)} className="absolute top-5 right-5 text-slate-500"><i className="fa-solid fa-xmark text-lg"></i></button>
<div className="p-6">
<h2 className="text-lg font-black text-center mb-6">Estadísticas Chile</h2>
{statsLoading ? (
<div className="space-y-6">
{[1,2,3].map(i => <div key={i} className="h-8 bg-slate-800 rounded-2xl loading-shimmer"></div>)}
</div>
) : statsData && statsData.leagues && statsData.leagues.length > 0 ? statsData.leagues.map((league, idx) => (
<div key={idx} className="mb-8">
<h3 className="text-[10px] font-black uppercase tracking-[0.25em] text-indigo-400 mb-3 flex items-center gap-2">
<i className="fa-solid fa-trophy"></i>
{league.name}
</h3>
<div className="glass rounded-3xl overflow-hidden">
{league.standings && league.standings.map((team, tIdx) => (
<div key={tIdx} className="flex items-center justify-between px-5 py-4 border-b border-white/10 last:border-0">
<div className="flex items-center gap-3">
<span className="text-xs font-black text-slate-400 w-6">{team.position}</span>
<span className="font-bold text-sm">{team.team}</span>
</div>
<div className="flex items-center gap-6 text-xs">
<span className="font-bold">{team.points} pts</span>
<span className="text-emerald-400">{team.wins}V</span>
<span className="text-amber-400">{team.draws}E</span>
<span className="text-red-400">{team.losses}D</span>
<span className="text-slate-400">{team.goalsFor}-{team.goalsAgainst}</span>
</div>
</div>
))}
</div>
</div>
)) : (
<div className="text-center py-12 text-slate-400">
<i className="fa-solid fa-chart-simple text-4xl mb-4"></i>
<p className="font-bold">No hay estadísticas disponibles en este momento</p>
</div>
)}
</div>
</div>
</div>
)}
{toast && <div className="fixed bottom-28 left-1/2 -translate-x-1/2 px-5 py-3 glass rounded-xl text-center z-[150] border border-emerald-500/20 bg-emerald-950/80"><p className="text-[10px] font-bold text-emerald-300 uppercase flex items-center gap-2"><i className="fa-solid fa-bell"></i> {toast}</p></div>}
</div>
);
};
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
