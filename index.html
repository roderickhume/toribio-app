<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Toribio Sat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "firebase/app": "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js"
      }
    }
    </script>
    <style>
        ::-webkit-scrollbar { width: 0; display: none; }
        .animate-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        body { background-color: #05070a; color: #f3f4f6; margin: 0; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from 'firebase/firestore';
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            projectId: "TU_PROYECTO",
            storageBucket: "TU_PROYECTO.appspot.com",
            messagingSenderId: "ID",
            appId: "APP_ID"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'toribio-sat-v1';
        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [selectedDay, setSelectedDay] = useState(0);
            const [leagues, setLeagues] = useState([]);
            const [favorites, setFavorites] = useState([]);
            const [selectedMatch, setSelectedMatch] = useState(null);
            useEffect(() => {
                signInAnonymously(auth).catch(console.error);
                return onAuthStateChanged(auth, setUser);
            }, []);
            const fetchMatches = useCallback(async (mode) => {
                setLoading(true);
                const apiKey = "TU_GEMINI_API_KEY";
                const rangeDesc = mode === -1 ? "finalizados ayer" : mode === 0 ? "hoy en vivo" : "próximos 3 días";
                const systemPrompt = "Responde solo JSON: { \"leagues\": [{ \"name\": \"LIGA\", \"matches\": [{ \"id\": \"1\", \"home\": \"A\", \"away\": \"B\", \"score\": \"0-0\", \"time\": \"90'\", \"status\": \"LIVE/FINAL/SCHEDULED\", \"date_label\": \"HOY\" }] }] }";
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Obtén partidos reales para: ${rangeDesc}. Fecha: ${new Date().toLocaleDateString('es-CL')}` }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    const result = await response.json();
                    const text = result.candidates[0].content.parts[0].text;
                    const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
                    setLeagues(json.leagues || []);
                } catch (e) {
                    console.error(e);
                    setLeagues([]);
                } finally {
                    setLoading(false);
                }
            }, []);
            useEffect(() => { fetchMatches(selectedDay); }, [selectedDay, fetchMatches]);
            useEffect(() => {
                if (!user) return;
                const favsRef = collection(db, 'users', user.uid, 'favorites');
                return onSnapshot(favsRef, (snap) => setFavorites(snap.docs.map(d => d.id)));
            }, [user]);
            const toggleFavorite = async (e, id) => {
                e.stopPropagation();
                if (!user) return;
                const docRef = doc(db, 'users', user.uid, 'favorites', String(id));
                favorites.includes(String(id)) ? await deleteDoc(docRef) : await setDoc(docRef, { active: true });
            };
            const getDayStyle = (m) => selectedDay === m ? (m===-1?'bg-emerald-500':m===0?'bg-indigo-600':'bg-rose-500') + " text-white shadow-lg" : "text-slate-500";
            return (
                <div className="flex flex-col min-h-screen max-w-md mx-auto">
                    <header className="p-6 flex justify-between items-center sticky top-0 bg-[#080a12]/80 backdrop-blur-md z-50">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-600/20">
                                <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                            </div>
                            <div>
                                <h1 className="text-sm font-bold uppercase">Toribio <span className="text-indigo-400">Sat</span></h1>
                                <p className="text-[9px] text-emerald-400 font-bold uppercase flex items-center gap-1"><span className="w-1 h-1 bg-emerald-500 rounded-full animate-pulse"></span>Active</p>
                            </div>
                        </div>
                        <button onClick={() => fetchMatches(selectedDay)} className="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center">
                            <svg className={`w-4 h-4 text-slate-400 ${loading?'animate-spin':''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                        </button>
                    </header>
                    <div className="px-6 mb-6">
                        <div className="bg-slate-900/50 p-1.5 rounded-2xl border border-white/5 flex gap-1">
                            {[-1, 0, 1].map(m => (
                                <button key={m} onClick={() => setSelectedDay(m)} className={`flex-1 py-3 text-[10px] font-bold uppercase rounded-xl transition-all ${getDayStyle(m)}`}>
                                    {m === -1 ? 'Pasado' : m === 0 ? 'Hoy' : 'Próximos'}
                                </button>
                            ))}
                        </div>
                    </div>
                    <main className="flex-1 px-6 space-y-8 pb-32">
                        {loading ? <div className="py-20 text-center text-[10px] uppercase tracking-widest opacity-30 animate-pulse">Escaneando...</div> : 
                        leagues.map((league, idx) => (
                            <section key={idx} className="animate-in">
                                <div className="flex items-center gap-2 mb-4">
                                    <div className="w-1 h-3 bg-indigo-500 rounded-full"></div>
                                    <h2 className="text-[10px] font-black text-slate-500 uppercase tracking-widest">{league.name}</h2>
                                </div>
                                <div className="space-y-3">
                                    {league.matches.map((match) => (
                                        <div key={match.id} onClick={() => setSelectedMatch(match)} className="bg-[#121622] border border-white/5 rounded-[24px] p-5 flex items-center justify-between hover:bg-slate-900/40 cursor-pointer">
                                            <div className="flex-1 space-y-2">
                                                <span className={`text-[9px] font-bold uppercase ${match.status==='LIVE'?'text-yellow-400':match.status==='FINAL'?'text-emerald-400':'text-slate-500'}`}>{match.date_label || match.status}</span>
                                                <div className="space-y-1">
                                                    <div className="flex justify-between pr-4"><span className="text-sm font-bold text-slate-200">{match.home}</span><span className="text-sm font-black">{match.status==='SCHEDULED'?'-':match.score.split('-')[0]}</span></div>
                                                    <div className="flex justify-between pr-4"><span className="text-sm font-bold text-slate-200">{match.away}</span><span className="text-sm font-black">{match.status==='SCHEDULED'?'-':match.score.split('-')[1]}</span></div>
                                                </div>
                                            </div>
                                            <div className="flex flex-col items-center gap-3 pl-4 border-l border-white/5 min-w-[70px]">
                                                <div className={`text-[9px] font-black py-1 px-2 rounded ${match.status==='LIVE'?'bg-rose-500/10 text-rose-500 animate-pulse':'bg-slate-800 text-slate-400'}`}>{match.time}</div>
                                                <button onClick={(e) => toggleFavorite(e, match.id)} className={`transition-all ${favorites.includes(String(match.id))?'text-amber-500':'text-slate-700'}`}>
                                                    <svg className="w-5 h-5 fill-current" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        ))}
                    </main>
                    {selectedMatch && (
                        <div className="fixed inset-0 z-[100] flex items-end justify-center bg-black/80 backdrop-blur-sm p-4" onClick={() => setSelectedMatch(null)}>
                            <div className="w-full bg-[#121622] rounded-[32px] p-8 border border-white/10 animate-in" onClick={e => e.stopPropagation()}>
                                <div className="w-12 h-1 bg-white/10 rounded-full mx-auto mb-6"></div>
                                <h3 className="text-lg font-bold text-center mb-6">{selectedMatch.home} vs {selectedMatch.away}</h3>
                                <button onClick={() => setSelectedMatch(null)} className="w-full py-4 bg-indigo-600 rounded-2xl font-bold text-[10px] uppercase tracking-widest">Cerrar</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
