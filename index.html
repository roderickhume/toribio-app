<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Toribio App | Oficial</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Scripts con carga prioritaria -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide-react"></script>

    <style>
        body { 
            background-color: #020617; 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
            overflow-x: hidden;
        }
        #root { min-height: 100vh; display: flex; flex-direction: column; }
        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #020617;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #4f46e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .active-scale:active { transform: scale(0.95); transition: 0.1s; }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading-screen">
            <div class="spinner"></div>
            <p style="margin-top: 20px; font-size: 10px; font-weight: bold; letter-spacing: 2px; color: #4f46e5; text-transform: uppercase;">Cargando Toribio...</p>
        </div>
    </div>

    <script type="text/javascript">
        window.addEventListener('load', function() {
            const { useState, useEffect } = React;
            const { ShieldCheck, RefreshCw, Zap, ChevronDown, Download, Calendar, LayoutGrid, Bell, User } = LucideReact;

            function App() {
                const [showWelcome, setShowWelcome] = useState(true);
                const [loading, setLoading] = useState(false);
                const [time, setTime] = useState(new Date().toLocaleTimeString());

                if (showWelcome) {
                    return React.createElement('div', { 
                        className: 'fixed inset-0 bg-indigo-600 z-[100] flex flex-col items-center justify-center p-10 text-center animate-in fade-in duration-300',
                        onClick: () => setShowWelcome(false)
                    },
                        React.createElement('div', { className: 'bg-white p-6 rounded-[2.5rem] text-indigo-600 shadow-2xl mb-8' }, 
                            React.createElement(ShieldCheck, { size: 64 })
                        ),
                        React.createElement('h1', { className: 'text-4xl font-black italic mb-2 tracking-tighter' }, 'TORIBIO APP'),
                        React.createElement('p', { className: 'text-indigo-100 font-bold text-[10px] uppercase tracking-[0.3em] mb-12 opacity-80' }, 'Santiago • Modo Realtime'),
                        React.createElement('button', { className: 'bg-white text-indigo-600 px-14 py-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl active-scale' }, 'ENTRAR')
                    );
                }

                return React.createElement('div', { className: 'flex flex-col min-h-screen bg-slate-950' },
                    // Header Profesional
                    React.createElement('header', { className: 'p-5 border-b border-white/5 flex justify-between items-center sticky top-0 bg-slate-950/90 backdrop-blur-xl z-40' },
                        React.createElement('div', { className: 'flex items-center gap-3' },
                            React.createElement('div', { className: 'bg-indigo-600 p-2 rounded-xl shadow-lg' }, React.createElement(ShieldCheck, { size: 22 })),
                            React.createElement('span', { className: 'font-black italic text-xl tracking-tight' }, 'TORIBIO', React.createElement('span', { className: 'text-indigo-500' }, 'APP'))
                        ),
                        React.createElement('button', { 
                            onClick: () => { setLoading(true); setTimeout(() => { setLoading(false); setTime(new Date().toLocaleTimeString()); }, 1500); },
                            className: `p-2.5 bg-slate-900 rounded-xl border border-white/5 ${loading ? 'animate-spin opacity-50' : 'active-scale'}`
                        }, React.createElement(RefreshCw, { size: 18 }))
                    ),

                    // Feed Principal
                    React.createElement('main', { className: 'flex-1 p-6 space-y-6 pb-40' },
                        React.createElement('div', { className: 'bg-indigo-700 p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden' },
                            React.createElement('h2', { className: 'text-2xl font-black italic mb-1 uppercase tracking-tighter' }, 'Santiago de Chile'),
                            React.createElement('p', { className: 'text-[9px] font-black uppercase tracking-widest text-indigo-200' }, 'Sincronizado: ' + time),
                            React.createElement(Zap, { className: 'absolute -right-8 -bottom-8 text-white/10', size: 160 })
                        ),

                        ['Campeonato Nacional', 'Copa Libertadores', 'Premier League', 'LaLiga'].map((liga, i) => 
                            React.createElement('div', { key: liga, className: 'bg-slate-900/60 p-6 rounded-[2.2rem] border border-white/5 flex justify-between items-center active-scale' },
                                React.createElement('div', { className: 'flex items-center gap-4' },
                                    React.createElement('div', { className: 'w-10 h-10 bg-slate-800 rounded-xl flex items-center justify-center font-black text-[10px] text-slate-500' }, '0' + (i+1)),
                                    React.createElement('span', { className: 'font-black text-sm uppercase italic tracking-tight' }, liga)
                                ),
                                React.createElement(ChevronDown, { size: 18, className: 'text-slate-700' })
                            )
                        )
                    ),

                    // Barra de Navegación "Floating"
                    React.createElement('nav', { className: 'fixed bottom-6 left-6 right-6 bg-slate-900/95 backdrop-blur-2xl border border-white/10 py-5 px-8 rounded-[2.5rem] flex justify-between items-center shadow-[0_20px_50px_rgba(0,0,0,0.5)] z-50' },
                        React.createElement(Calendar, { size: 22, className: 'opacity-30' }),
                        React.createElement(LayoutGrid, { size: 22, className: 'opacity-30' }),
                        React.createElement('div', { className: 'bg-indigo-600 p-4.5 rounded-[1.5rem] -mt-16 border-[6px] border-slate-950 shadow-xl active-scale' }, 
                            React.createElement(Download, { size: 26 })
                        ),
                        React.createElement(Bell, { size: 22, className: 'opacity-30' }),
                        React.createElement(User, { size: 22, className: 'opacity-30' })
                    )
                );
            }

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(React.createElement(App));
        });
    </script>
</body>
</html>
