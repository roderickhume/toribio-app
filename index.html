<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Toribio App | Oficial</title>
    
    <!-- Enlace al Manifiesto para Instalación Real -->
    <link rel="manifest" href="manifest.json">
    
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5329/5329944.png">

    <!-- Tailwind & React desde CDN para máxima velocidad -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide-react"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .glass-nav {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="bg-slate-950 text-white overflow-x-hidden">
    <div id="root"></div>

    <script>
        // Registro de Service Worker para habilitar PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Toribio SW registrado'))
                    .catch(err => console.log('Error SW:', err));
            });
        }
    </script>

    <script type="text/javascript">
        const { useState, useEffect, useMemo } = React;
        const { Search, Calendar, ChevronDown, Bell, Trophy, MapPin, RefreshCw, Download, Zap, X, ShieldCheck, Share, PlusSquare, MoreVertical, User, LayoutGrid } = lucide;

        function App() {
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [showInstallGuide, setShowInstallGuide] = useState(false);
            const [lastUpdate, setLastUpdate] = useState(new Date().toLocaleTimeString());
            const [showWelcome, setShowWelcome] = useState(true);

            const handleRefresh = () => {
                if (isAiLoading) return;
                setIsAiLoading(true);
                setTimeout(() => {
                    setLastUpdate(new Date().toLocaleTimeString());
                    setIsAiLoading(false);
                }, 1500);
            };

            return React.createElement('div', { className: 'min-h-screen bg-slate-950 flex flex-col' },
                // Splash Screen / Bienvenida Profesional
                showWelcome && React.createElement('div', { className: 'fixed inset-0 bg-indigo-600 z-[100] flex flex-col items-center justify-center p-10 text-center animate-in fade-in duration-500' },
                    React.createElement('div', { className: 'relative mb-8' },
                        React.createElement('div', { className: 'absolute inset-0 bg-white/20 rounded-full animate-ping scale-150' }),
                        React.createElement('div', { className: 'bg-white p-6 rounded-[2.5rem] relative z-10 text-indigo-600 shadow-2xl' }, React.createElement(ShieldCheck, { size: 60 }))
                    ),
                    React.createElement('h1', { className: 'text-4xl font-black italic mb-2 tracking-tighter' }, 'TORIBIO APP'),
                    React.createElement('p', { className: 'text-indigo-100 font-bold tracking-[0.3em] text-[9px] uppercase mb-12' }, 'Fútbol Realtime • Santiago'),
                    React.createElement('button', { 
                        onClick: () => setShowWelcome(false), 
                        className: 'bg-white text-indigo-600 px-12 py-5 rounded-2xl font-black uppercase text-xs shadow-2xl active:scale-95 transition-all tracking-widest' 
                    }, 'ENTRAR AL ESTADIO')
                ),

                // Header con desenfoque de cristal
                React.createElement('header', { className: 'sticky top-0 bg-slate-950/80 backdrop-blur-xl border-b border-white/5 z-40 p-5' },
                    React.createElement('div', { className: 'max-w-2xl mx-auto flex items-center justify-between' },
                        React.createElement('div', { className: 'flex items-center gap-3' },
                            React.createElement('div', { className: 'bg-indigo-600 p-2.5 rounded-xl shadow-lg shadow-indigo-500/20' }, React.createElement(ShieldCheck, { size: 22 })),
                            React.createElement('div', null,
                                React.createElement('h1', { className: 'font-black italic text-xl leading-none' }, 'TORIBIO', React.createElement('span', { className: 'text-indigo-500' }, 'APP')),
                                React.createElement('div', { className: 'flex items-center gap-1.5 mt-1' },
                                    React.createElement('div', { className: 'w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse' }),
                                    React.createElement('span', { className: 'text-[8px] font-black text-slate-500 uppercase tracking-widest' }, lastUpdate)
                                )
                            )
                        ),
                        React.createElement('button', { 
                            onClick: handleRefresh, 
                            className: `p-3 bg-slate-900 rounded-xl active:scale-90 transition-all border border-white/5 ${isAiLoading ? 'animate-spin opacity-50' : ''}` 
                        }, React.createElement(RefreshCw, { size: 18 }))
                    )
                ),

                // Contenido Principal
                React.createElement('main', { className: 'flex-1 p-5 max-w-2xl mx-auto w-full space-y-6 pb-40' },
                    // Tarjeta Principal Dinámica
                    React.createElement('div', { className: 'bg-indigo-700 p-8 rounded-[3rem] relative overflow-hidden shadow-2xl group' },
                        React.createElement('div', { className: 'relative z-10' },
                            React.createElement('span', { className: 'bg-white/20 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest mb-4 inline-block backdrop-blur-md' }, 'Zona Local: Santiago'),
                            React.createElement('h2', { className: 'text-3xl font-black mb-2 italic tracking-tighter leading-none' }, 'RESULTADOS EN VIVO'),
                            React.createElement('p', { className: 'text-indigo-100 text-xs font-medium max-w-[80%] leading-relaxed' }, 'Toribio App ha optimizado la señal para tu ubicación actual.')
                        ),
                        React.createElement(Zap, { className: 'absolute -right-6 -bottom-6 text-white/10 group-hover:scale-110 transition-transform duration-700', size: 180 })
                    ),

                    // Lista de Ligas Estilizada
                    ['Campeonato Nacional', 'Copa Libertadores', 'Premier League', 'LaLiga'].map((liga, idx) => 
                        React.createElement('div', { key: liga, className: 'bg-slate-900/50 p-6 rounded-[2.5rem] border border-white/5 flex items-center justify-between active:bg-slate-900 transition-all duration-300' },
                            React.createElement('div', { className: 'flex items-center gap-5' },
                                React.createElement('div', { className: 'w-12 h-12 bg-slate-800 rounded-2xl flex items-center justify-center font-black text-[10px] text-indigo-400 border border-white/5' }, '0' + (idx+1)),
                                React.createElement('div', null,
                                    React.createElement('span', { className: 'font-black text-base block tracking-tight uppercase italic' }, liga),
                                    React.createElement('span', { className: 'text-[9px] text-slate-500 font-bold uppercase tracking-widest' }, 'Partidos para hoy')
                                )
                            ),
                            React.createElement('div', { className: 'w-10 h-10 rounded-full flex items-center justify-center bg-slate-800/50' }, React.createElement(ChevronDown, { size: 18, className: 'text-slate-600' }))
                        )
                    )
                ),

                // Barra Flotante Premium (Glassmorphism)
                React.createElement('div', { className: 'fixed bottom-0 left-0 right-0 p-6 flex justify-center z-50 pointer-events-none' },
                    React.createElement('nav', { className: 'glass-nav rounded-[2.5rem] py-5 px-8 flex justify-between items-center text-white shadow-[0_20px_50px_rgba(0,0,0,0.6)] border border-white/10 w-full max-w-lg pointer-events-auto' },
                        React.createElement('div', { className: 'flex flex-col items-center gap-1.5 opacity-40' }, React.createElement(Calendar, { size: 22 }), React.createElement('span', { className: 'text-[7px] font-black uppercase tracking-widest' }, 'Live')),
                        React.createElement('div', { className: 'flex flex-col items-center gap-1.5 opacity-40' }, React.createElement(LayoutGrid, { size: 22 }), React.createElement('span', { className: 'text-[7px] font-black uppercase tracking-widest' }, 'Ligas')),
                        React.createElement('div', { 
                            onClick: () => setShowInstallGuide(true), 
                            className: 'bg-indigo-600 p-4.5 rounded-[1.5rem] text-white -mt-16 shadow-2xl shadow-indigo-600/40 active:scale-90 transition-all border-[6px] border-slate-950 cursor-pointer' 
                        }, React.createElement(Download, { size: 26 })),
                        React.createElement('div', { className: 'flex flex-col items-center gap-1.5 opacity-40' }, React.createElement(Bell, { size: 22 }), React.createElement('span', { className: 'text-[7px] font-black uppercase tracking-widest' }, 'Alert')),
                        React.createElement('div', { className: 'flex flex-col items-center gap-1.5 opacity-40' }, React.createElement(User, { size: 22 }), React.createElement('span', { className: 'text-[7px] font-black uppercase tracking-widest' }, 'Perfil'))
                    )
                ),

                // Modal de Instalación PWA (Móvil)
                showInstallGuide && React.createElement('div', { className: 'fixed inset-0 bg-slate-950/95 z-[110] flex items-end p-4 safe-bottom animate-in fade-in duration-300' },
                    React.createElement('div', { className: 'bg-white text-slate-900 w-full p-10 rounded-[3.5rem] shadow-2xl animate-in slide-in-from-bottom duration-500' },
                        React.createElement('div', { className: 'w-16 h-1.5 bg-slate-100 rounded-full mx-auto mb-10' }),
                        React.createElement('div', { className: 'flex justify-between items-start mb-8' },
                            React.createElement('div', { className: 'bg-indigo-600 p-5 rounded-3xl shadow-xl shadow-indigo-200' }, React.createElement(Download, { className: 'text-white', size: 32 })),
                            React.createElement('button', { onClick: () => setShowInstallGuide(false), className: 'bg-slate-50 p-3 rounded-full' }, React.createElement(X, { size: 24 }))
                        ),
                        React.createElement('h2', { className: 'text-3xl font-black mb-4 tracking-tighter italic uppercase' }, 'Lleva a Toribio en tu Inicio'),
                        React.createElement('p', { className: 'text-slate-500 text-sm mb-10 leading-relaxed font-medium' }, 'Pulsa el icono de compartir en tu navegador y selecciona "Añadir a la pantalla de inicio" para una experiencia 100% nativa.'),
                        React.createElement('button', { 
                            onClick: () => setShowInstallGuide(false), 
                            className: 'w-full py-5 bg-indigo-600 text-white rounded-[1.75rem] font-black uppercase text-xs tracking-[0.2em] shadow-xl shadow-indigo-200 active:scale-95 transition-all' 
                        }, '¡ENTENDIDO, VAMOS!')
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
