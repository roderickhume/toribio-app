<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Toribio Sat</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel para compilar JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Mapa de importaciones para resolver módulos en el navegador -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
      }
    }
    </script>

    <style>
        ::-webkit-scrollbar { width: 0; display: none; }
        .animate-in { animation-name: fadeIn; animation-duration: 0.5s; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        body {
            background-color: #05070a;
            color: #f3f4f6;
            margin: 0;
            padding: 0;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'firebase/auth';
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from 'firebase/firestore';

        // Configuración de Firebase y Entorno
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'toribio-sat-v1';

        const App = () => {
          const [user, setUser] = useState(null);
          const [loading, setLoading] = useState(true);
          const [selectedDay, setSelectedDay] = useState(0); // -1: Ayer, 0: Hoy, 1: Mañana
          const [leagues, setLeagues] = useState([]);
          const [favorites, setFavorites] = useState([]);
          const [selectedMatch, setSelectedMatch] = useState(null);

          // Inicialización de Autenticación
          useEffect(() => {
            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                  await signInAnonymously(auth);
                }
              } catch (e) { 
                console.error("Auth error", e); 
              }
            };
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, setUser);
            return () => unsubscribe();
          }, []);

          // Función para obtener partidos con la API de Gemini
          const fetchMatches = useCallback(async (mode) => {
            setLoading(true);
            const apiKey = ""; 
            
            let rangeDesc = "";
            if (mode === -1) rangeDesc = "resultados finales reales de los últimos 3 días (Ayer y previo)";
            if (mode === 0) rangeDesc = "partidos reales de HOY y partidos que están EN VIVO ahora";
            if (mode === 1) rangeDesc = "calendario de partidos próximos reales en los siguientes 3 días";

            const systemPrompt = `Eres Toribio Satellite V9.1. Tu misión es entregar datos deportivos precisos.
            INSTRUCCIONES:
            - Modo -1: Partidos terminados (FINAL).
            - Modo 0: Partidos de hoy o en vivo (LIVE).
            - Modo 1: Partidos programados (SCHEDULED).
            LIGAS: Campeonato Chileno, Premier League, La Liga, Champions League, Copa Libertadores.
            
            IMPORTANTE: Responde ÚNICAMENTE con el objeto JSON. Sin texto adicional ni bloques de markdown.
            Estructura:
            {
              "leagues": [
                {
                  "name": "NOMBRE DE LIGA",
                  "matches": [
                    {
                      "id": "unique_id",
                      "home": "Equipo Local",
                      "away": "Equipo Visita",
                      "score": "G-G",
                      "time": "Minuto o Hora",
                      "status": "LIVE/FINAL/SCHEDULED",
                      "date_label": "HOY/AYER/FECHA"
                    }
                  ]
                }
              ]
            }`;

            const payload = {
              contents: [{ parts: [{ text: `Obtén partidos reales para: ${rangeDesc}. Fecha actual: ${new Date().toLocaleDateString('es-CL')}` }] }],
              systemInstruction: { parts: [{ text: systemPrompt }] },
              tools: [{ "google_search": {} }]
            };

            const callGeminiWithRetry = async (retries = 5, delay = 1000) => {
              try {
                const baseUrl = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent";
                const url = apiKey ? `${baseUrl}?key=${apiKey}` : baseUrl;
                
                const response = await fetch(url, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(payload)
                });

                if (!response.ok) {
                  if (retries > 0) {
                    await new Promise(resolve => setTimeout(resolve, delay));
                    return callGeminiWithRetry(retries - 1, delay * 2);
                  }
                  throw new Error(`HTTP error! status: ${response.status}`);
                }

                const result = await response.json();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text || "";
                
                if (!text) throw new Error("Empty response text");

                const jsonStart = text.indexOf('{');
                const jsonEnd = text.lastIndexOf('}');
                
                if (jsonStart !== -1 && jsonEnd !== -1) {
                  const jsonString = text.substring(jsonStart, jsonEnd + 1);
                  return JSON.parse(jsonString);
                } else {
                  throw new Error("No valid JSON block found in response");
                }
              } catch (error) {
                if (retries > 0) {
                  await new Promise(resolve => setTimeout(resolve, delay));
                  return callGeminiWithRetry(retries - 1, delay * 2);
                }
                throw error;
              }
            };

            try {
              const data = await callGeminiWithRetry();
              setLeagues(data.leagues || []);
            } catch (error) {
              console.error("Fetch error:", error);
              setLeagues([]);
            } finally {
              setLoading(false);
            }
          }, []);

          useEffect(() => {
            fetchMatches(selectedDay);
          }, [selectedDay, fetchMatches]);

          // Sincronización de Favoritos
          useEffect(() => {
            if (!user) return;
            const favsRef = collection(db, 'artifacts', appId, 'public', 'data', 'favorites');
            const unsubscribe = onSnapshot(favsRef, (snap) => {
              setFavorites(snap.docs.map(d => d.id));
            }, (err) => console.error("Firestore error:", err));
            return () => unsubscribe();
          }, [user]);

          const toggleFavorite = async (id) => {
            if (!user) return;
            const idStr = String(id);
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'favorites', idStr);
            if (favorites.includes(idStr)) {
              await deleteDoc(docRef);
            } else {
              await setDoc(docRef, { active: true, timestamp: new Date() });
            }
          };

          const getDaySelectorStyle = (mode) => {
            if (selectedDay !== mode) return "text-slate-500 bg-transparent";
            if (mode === -1) return "bg-emerald-500 text-white shadow-lg shadow-emerald-500/20"; 
            if (mode === 0) return "bg-indigo-600 text-white shadow-lg shadow-indigo-600/20"; 
            if (mode === 1) return "bg-rose-500 text-white shadow-lg shadow-rose-500/20"; 
          };

          const getLabelColor = (status, date) => {
            if (status === 'LIVE' || date?.toLowerCase().includes('vivo')) return 'text-yellow-400';
            if (status === 'FINAL' || date?.toLowerCase().includes('ayer')) return 'text-emerald-400';
            return 'text-slate-500';
          };

          return (
            <div className="flex flex-col min-h-screen max-w-md mx-auto selection:bg-indigo-500/30">
              
              {/* Header */}
              <header className="p-6 flex justify-between items-center sticky top-0 bg-[#080a12]/80 backdrop-blur-md z-50">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-600/20">
                    <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                  </div>
                  <div>
                    <h1 className="text-sm font-bold tracking-tight uppercase">Toribio <span className="text-indigo-400">Sat</span></h1>
                    <p className="text-[9px] text-emerald-400 font-bold tracking-widest uppercase flex items-center gap-1">
                      <span className="w-1 h-1 bg-emerald-500 rounded-full animate-pulse"></span>
                      Satellite Active
                    </p>
                  </div>
                </div>
                <button onClick={() => fetchMatches(selectedDay)} className="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/10 active:scale-95 transition-all">
                  <svg className={`w-4 h-4 text-slate-400 ${loading ? 'animate-spin' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                </button>
              </header>

              {/* Rango de Fechas */}
              <div className="px-6 mb-6">
                <div className="bg-slate-900/50 p-1.5 rounded-2xl border border-white/5 flex gap-1 shadow-inner">
                  <button onClick={() => setSelectedDay(-1)} className={`flex-1 py-3 text-[10px] font-bold uppercase rounded-xl transition-all ${getDaySelectorStyle(-1)}`}>Pasado</button>
                  <button onClick={() => setSelectedDay(0)} className={`flex-1 py-3 text-[10px] font-bold uppercase rounded-xl transition-all ${getDaySelectorStyle(0)}`}>Hoy</button>
                  <button onClick={() => setSelectedDay(1)} className={`flex-1 py-3 text-[10px] font-bold uppercase rounded-xl transition-all ${getDaySelectorStyle(1)}`}>Próximos</button>
                </div>
              </div>

              {/* Partidos */}
              <main className="flex-1 px-6 space-y-8 pb-32">
                {loading ? (
                  <div className="flex flex-col items-center justify-center py-20 opacity-30">
                    <div className="w-8 h-8 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="text-[10px] font-bold uppercase tracking-widest">Escaneando señal...</p>
                  </div>
                ) : leagues.length === 0 ? (
                  <div className="text-center py-20 opacity-40">
                    <p className="text-xs uppercase font-bold">No se encontraron datos en esta zona</p>
                  </div>
                ) : (
                  leagues.map((league, idx) => (
                    <section key={idx} className="animate-in">
                      <div className="flex items-center gap-2 mb-4">
                        <div className="w-1 h-3 bg-indigo-500 rounded-full"></div>
                        <h2 className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em]">{league.name}</h2>
                      </div>

                      <div className="space-y-3">
                        {league.matches.map((match) => (
                          <div 
                            key={match.id}
                            onClick={() => setSelectedMatch(match)}
                            className="bg-[#121622] border border-white/5 rounded-[28px] p-5 flex items-center justify-between active:scale-[0.98] transition-all hover:bg-slate-900/40 cursor-pointer"
                          >
                            <div className="flex-1 space-y-3">
                              <span className={`text-[9px] font-bold uppercase tracking-widest ${getLabelColor(match.status, match.date_label)}`}>
                                {match.date_label || match.status}
                              </span>
                              <div className="space-y-1.5">
                                <div className="flex justify-between items-center pr-4">
                                  <span className="text-sm font-bold text-slate-200">{match.home}</span>
                                  <span className="text-sm font-black tabular-nums">{match.status === 'SCHEDULED' ? '-' : (match.score || '0-0').split('-')[0]}</span>
                                </div>
                                <div className="flex justify-between items-center pr-4">
                                  <span className="text-sm font-bold text-slate-200">{match.away}</span>
                                  <span className="text-sm font-black tabular-nums">{match.status === 'SCHEDULED' ? '-' : (match.score || '0-0').split('-')[1]}</span>
                                </div>
                              </div>
                            </div>

                            <div className="flex flex-col items-center gap-3 pl-4 border-l border-white/5 min-w-[70px]">
                              <div className={`text-[10px] font-black py-1.5 px-3 rounded-lg ${
                                match.status === 'LIVE' ? 'bg-rose-500/10 text-rose-500 animate-pulse' : 
                                match.status === 'FINAL' ? 'bg-slate-800 text-slate-400' : 'bg-indigo-500/10 text-indigo-400'
                              }`}>
                                {match.time}
                              </div>
                              <button 
                                onClick={(e) => { e.stopPropagation(); toggleFavorite(match.id); }}
                                className={`text-sm transition-all active:scale-150 ${favorites.includes(String(match.id)) ? 'text-amber-500 drop-shadow-[0_0_8px_rgba(245,158,11,0.5)]' : 'text-slate-800'}`}
                              >
                                <svg className="w-5 h-5 fill-current" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>
                              </button>
                            </div>
                          </div>
                        ))}
                      </div>
                    </section>
                  ))
                )}
              </main>

              {/* Modal Detalle */}
              {selectedMatch && (
                <div className="fixed inset-0 z-[100] flex items-end justify-center bg-black/80 backdrop-blur-sm p-4" onClick={() => setSelectedMatch(null)}>
                  <div className="w-full bg-[#121622] rounded-[40px] p-8 border border-white/10 animate-in" onClick={e => e.stopPropagation()}>
                    <div className="w-12 h-1 bg-white/10 rounded-full mx-auto mb-6"></div>
                    <h3 className="text-xl font-bold text-center mb-6">{selectedMatch.home} vs {selectedMatch.away}</h3>
                    <div className="grid grid-cols-2 gap-4 mb-8 text-center">
                      <div className="bg-white/5 p-4 rounded-3xl border border-white/5">
                        <p className="text-[9px] uppercase font-bold text-slate-500 mb-1">Estado</p>
                        <p className="text-xs font-bold text-indigo-400">{selectedMatch.status}</p>
                      </div>
                      <div className="bg-white/5 p-4 rounded-3xl border border-white/5">
                        <p className="text-[9px] uppercase font-bold text-slate-500 mb-1">Cronómetro</p>
                        <p className="text-xs font-bold text-indigo-400">{selectedMatch.time}</p>
                      </div>
                    </div>
                    <button onClick={() => setSelectedMatch(null)} className="w-full py-4 bg-indigo-600 rounded-2xl font-bold text-xs uppercase tracking-widest shadow-lg shadow-indigo-600/30" >
                      Cerrar Satélite
                    </button>
                  </div>
                </div>
              )}
            </div>
          );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
