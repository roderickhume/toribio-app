<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Toribio Pro | Fútbol en Vivo</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        window.firebase = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot, collection };
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .active-tab { color: #6366f1; position: relative; }
        .active-tab::after { content: ''; position: absolute; bottom: -8px; width: 4px; height: 4px; background: #6366f1; border-radius: 50%; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide { animation: slideUp 0.4s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            // Firebase & Auth State
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            
            // App State
            const [view, setView] = useState('inicio'); // inicio, favoritos, tablas, config
            const [loading, setLoading] = useState(true);
            const [data, setData] = useState({ leagues: [] });
            const [favorites, setFavorites] = useState({ leagues: [], teams: [] });
            const [weekOffset, setWeekOffset] = useState(0);
            const [expanded, setExpanded] = useState({});
            const [reminder, setReminder] = useState(null);

            const appId = typeof __app_id !== 'undefined' ? __app_id : 'toribio-app-v2';
            const apiKey = ""; // Inyectado por entorno

            // 1. Inicializar Firebase
            useEffect(() => {
                const config = JSON.parse(__firebase_config);
                const app = window.firebase.initializeApp(config);
                const auth = window.firebase.getAuth(app);
                const firestore = window.firebase.getFirestore(app);
                setDb(firestore);

                window.firebase.signInAnonymously(auth).catch(console.error);
                const unsub = window.firebase.onAuthStateChanged(auth, (u) => setUser(u));
                return () => unsub();
            }, []);

            // 2. Escuchar Favoritos de Firestore
            useEffect(() => {
                if (!user || !db) return;
                const favDoc = window.firebase.doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'prefs');
                const unsub = window.firebase.onSnapshot(favDoc, (doc) => {
                    if (doc.exists()) setFavorites(doc.data());
                }, (err) => console.error("Error favoritos:", err));
                return () => unsub();
            }, [user, db]);

            // 3. IA Fetching (Gemini + Google Search)
            const fetchData = async (offset) => {
                setLoading(true);
                const targetDate = new Date();
                targetDate.setDate(targetDate.getDate() + (offset * 7));
                
                const query = `Resultados y calendario de futbol real para la semana del ${targetDate.toLocaleDateString()} de las ligas: 
                Chile (Primera y B), Premier League, LaLiga, Serie A, Bundesliga, Champions, Libertadores, MLS, Liga MX y Argentina. 
                Incluir ranking de los primeros 3 de cada liga.`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: query }] }],
                            systemInstruction: { parts: [{ text: "Responde ÚNICAMENTE un JSON con esta estructura exacta: { 'leagues': [ { 'name': 'Nombre', 'country': 'Pais', 'matches': [ {'home': '', 'away': '', 'score': '', 'time': '', 'status': 'FINAL/LIVE/SCHEDULED'} ], 'ranking': [{'pos':1, 'team':'', 'pts':0}] } ] }. No incluyas texto fuera del JSON." }] },
                            tools: [{ "google_search": {} }]
                        })
                    });

                    const res = await response.json();
                    const rawText = res.candidates[0].content.parts[0].text;
                    const jsonStr = rawText.match(/\{[\s\S]*\}/)[0];
                    setData(JSON.parse(jsonStr));
                } catch (e) {
                    console.error("Fetch error:", e);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => { fetchData(weekOffset); }, [weekOffset]);

            // 4. Acciones
            const toggleFav = async (name) => {
                if (!user || !db) return;
                const newFavs = { ...favorites };
                if (newFavs.leagues.includes(name)) {
                    newFavs.leagues = newFavs.leagues.filter(l => l !== name);
                } else {
                    newFavs.leagues.push(name);
                }
                const docRef = window.firebase.doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'prefs');
                await window.firebase.setDoc(docRef, newFavs);
            };

            const toggleExpand = (name) => setExpanded(p => ({...p, [name]: !p[name]}));

            // Componentes UI
            const MatchCard = ({ m }) => (
                <div className="bg-white/5 border border-white/5 p-4 rounded-2xl flex items-center justify-between mb-2">
                    <div className="flex-1 text-right text-xs font-bold truncate pr-2">{m.home}</div>
                    <div className="flex flex-col items-center min-w-[70px]">
                        <div className={`px-2 py-1 rounded-lg text-[10px] font-black ${m.status === 'LIVE' ? 'bg-red-500 animate-pulse' : 'bg-indigo-600'}`}>
                            {m.score || m.time}
                        </div>
                        <button onClick={() => setReminder(m.home + ' vs ' + m.away)} className="text-[8px] text-slate-500 mt-1 uppercase font-bold">
                            <i className="fa-solid fa-bell mr-1"></i> Recordar
                        </button>
                    </div>
                    <div className="flex-1 text-left text-xs font-bold truncate pl-2">{m.away}</div>
                </div>
            );

            const filteredLeagues = data.leagues.filter(l => view === 'favoritos' ? favorites.leagues.includes(l.name) : true);

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col pb-24">
                    {/* Header */}
                    <header className="p-6 sticky top-0 z-40 bg-[#020617]/80 backdrop-blur-xl flex justify-between items-center border-b border-white/5">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center rotate-6">
                                <i className="fa-solid fa-bolt text-white text-sm"></i>
                            </div>
                            <h1 className="text-xl font-black italic tracking-tighter">TORIBIO<span className="text-indigo-500">PRO</span></h1>
                        </div>
                        <div className="flex gap-4 text-slate-400">
                            <i className="fa-solid fa-magnifying-glass"></i>
                            <i className="fa-solid fa-user-ninja"></i>
                        </div>
                    </header>

                    <main className="px-4 pt-4 flex-1">
                        {/* Selector de Fecha */}
                        <div className="glass rounded-3xl p-2 flex justify-between items-center mb-6">
                            <button onClick={() => setWeekOffset(w => w - 1)} className="p-3 text-slate-400 hover:text-white"><i className="fa-solid fa-chevron-left"></i></button>
                            <div className="text-center">
                                <p className="text-[9px] font-black text-indigo-500 uppercase tracking-widest leading-none mb-1">Calendario</p>
                                <p className="text-xs font-bold">{weekOffset === 0 ? "Esta Semana" : (weekOffset > 0 ? `Semanas +${weekOffset}` : `Semanas ${weekOffset}`)}</p>
                            </div>
                            <button onClick={() => setWeekOffset(w => w + 1)} className="p-3 text-slate-400 hover:text-white"><i className="fa-solid fa-chevron-right"></i></button>
                        </div>

                        {loading ? (
                            <div className="flex flex-col items-center justify-center py-20 opacity-50">
                                <div className="w-8 h-8 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                                <p className="text-[10px] font-bold uppercase tracking-widest">Buscando datos globales...</p>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                {filteredLeagues.length === 0 && view === 'favoritos' && (
                                    <div className="text-center py-10 text-slate-500 text-sm italic">No tienes ligas favoritas marcadas.</div>
                                )}
                                {filteredLeagues.map(league => (
                                    <div key={league.name} className="glass rounded-[28px] overflow-hidden animate-slide">
                                        <div onClick={() => toggleExpand(league.name)} className="p-5 flex justify-between items-center">
                                            <div className="flex items-center gap-4">
                                                <div className="w-10 h-10 bg-white/5 rounded-2xl flex items-center justify-center text-indigo-400 text-lg">
                                                    <i className="fa-solid fa-globe"></i>
                                                </div>
                                                <div>
                                                    <h3 className="text-xs font-black uppercase italic tracking-tight">{league.name}</h3>
                                                    <p className="text-[9px] text-slate-500 font-bold uppercase">{league.country}</p>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-4">
                                                <button onClick={(e) => { e.stopPropagation(); toggleFav(league.name); }} className="text-lg">
                                                    <i className={`fa-star ${favorites.leagues.includes(league.name) ? 'fa-solid text-yellow-400' : 'fa-regular text-slate-600'}`}></i>
                                                </button>
                                                <i className={`fa-solid fa-chevron-${expanded[league.name] ? 'down' : 'right'} text-slate-600 text-xs`}></i>
                                            </div>
                                        </div>

                                        {expanded[league.name] && (
                                            <div className="px-5 pb-5">
                                                {view === 'tablas' ? (
                                                    <div className="bg-white/5 rounded-2xl p-4">
                                                        <p className="text-[10px] font-black text-slate-500 mb-3 uppercase tracking-widest">Ranking Top 3</p>
                                                        {league.ranking?.map(r => (
                                                            <div key={r.pos} className="flex justify-between text-xs py-2 border-b border-white/5 last:border-0">
                                                                <span className="font-bold">{r.pos}. {r.team}</span>
                                                                <span className="text-indigo-400 font-black">{r.pts} PTS</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                ) : (
                                                    league.matches.map((m, i) => <MatchCard key={i} m={m} />)
                                                )}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* Modal Estilo Gmail */}
                    {reminder && (
                        <div className="fixed inset-0 z-[100] flex items-end justify-center p-4 animate-in fade-in duration-300">
                            <div className="absolute inset-0 bg-black/80 backdrop-blur-sm" onClick={() => setReminder(null)}></div>
                            <div className="bg-[#0f172a] w-full rounded-[40px] p-8 relative border border-white/10 animate-slide">
                                <div className="w-12 h-1 bg-slate-800 rounded-full mx-auto mb-8"></div>
                                <div className="flex items-center gap-4 mb-8">
                                    <div className="w-12 h-12 bg-indigo-500/20 rounded-2xl flex items-center justify-center text-indigo-500 text-xl"><i className="fa-solid fa-bell"></i></div>
                                    <div>
                                        <h4 className="font-black italic uppercase leading-none">{reminder}</h4>
                                        <p className="text-[10px] text-slate-500 font-bold uppercase mt-1">Configurar Recordatorio</p>
                                    </div>
                                </div>
                                <div className="space-y-3">
                                    {["10 min antes", "1 hora antes", "Al empezar", "Recordar mañana"].map(opt => (
                                        <button key={opt} onClick={() => setReminder(null)} className="w-full p-5 bg-white/5 rounded-2xl text-left font-bold text-sm flex justify-between items-center hover:bg-indigo-600 transition-colors">
                                            {opt} <i className="fa-solid fa-clock-rotate-left opacity-30"></i>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Footer Nav */}
                    <nav className="fixed bottom-0 inset-x-0 glass border-t border-white/5 p-4 flex justify-around items-center z-40">
                        <NavBtn icon="fa-house" label="Inicio" active={view === 'inicio'} onClick={() => setView('inicio')} />
                        <NavBtn icon="fa-star" label="Favoritos" active={view === 'favoritos'} onClick={() => setView('favoritos')} />
                        <NavBtn icon="fa-chart-line" label="Tablas" active={view === 'tablas'} onClick={() => setView('tablas')} />
                        <NavBtn icon="fa-gear" label="Config" active={view === 'config'} onClick={() => setView('config')} />
                    </nav>
                </div>
            );
        };

        const NavBtn = ({ icon, label, active, onClick }) => (
            <button onClick={onClick} className={`flex flex-col items-center gap-1 transition-all ${active ? 'active-tab' : 'text-slate-600'}`}>
                <i className={`fa-solid ${icon} text-lg`}></i>
                <span className="text-[8px] font-black uppercase tracking-tighter">{label}</span>
            </button>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
