<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Toribio Pro | Detalle CL v9.1</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; padding: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
.glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
.match-card { transition: all 0.2s ease; cursor: pointer; }
.match-card:active { transform: scale(0.98); background: rgba(30, 41, 59, 0.6); }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
.loading-shimmer { background: linear-gradient(90deg, #0f172a 25%, #1e293b 50%, #0f172a 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
.modal-enter-active { animation: modalFade 0.3s ease-out; }
@keyframes modalFade { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const App = () => {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [selectedTab, setSelectedTab] = useState("hoy");
  const [selectedMatch, setSelectedMatch] = useState(null);
  const [favorites, setFavorites] = useState([]);
  const [toast, setToast] = useState("");
  const [error, setError] = useState("");
  const [showStats, setShowStats] = useState(false);
  const [statsData, setStatsData] = useState(null);
  const [statsLoading, setStatsLoading] = useState(false);

  const safeSplit = (score) => {
    if (!score || typeof score !== "string") return ["-", "-"];
    const parts = score.split("-");
    return [parts[0] || "-", parts[1] || "-"];
  };

  const toggleFavorite = (matchId) => {
    setFavorites(prev => {
      const isFav = prev.includes(matchId);
      setToast(isFav ? "Eliminado de favoritos." : "Añadido a favoritos.");
      setTimeout(() => setToast(""), 2000);
      return isFav ? prev.filter(id => id !== matchId) : [...prev, matchId];
    });
  };

  const fetchWithCache = async (tab, isStats = false) => {
    const cacheKey = isStats ? "stats_cache" : `matches_${tab}`;
    const cacheTimeKey = `${cacheKey}_time`;

    const cachedData = localStorage.getItem(cacheKey);
    const cachedTime = localStorage.getItem(cacheTimeKey);

    if (cachedData && cachedTime) {
      const age = Date.now() - parseInt(cachedTime);
      if (age < 10 * 60 * 1000) {
        const parsed = JSON.parse(cachedData);
        if (isStats) setStatsData(parsed);
        else setData(parsed);
        return parsed;
      }
    }

    setLoading(true);
    setError("");

    // Calcular fechas exactas
    const today = new Date();
    const options = { day: '2-digit', month: '2-digit', year: 'numeric' }; 
    
    const todayStr = today.toLocaleDateString('es-CL', options);
    
    const tomorrow = new Date(today);
    //tomorrow.setDate(today.getDate() + 1);
    tomorrow.setDate(today.getDate() + 3 + 1); // +7 días + 1 para saltar hoy

    const tomorrowStr = tomorrow.toLocaleDateString('es-CL', options);

    const pasadoStrn= new Date(today);
    //tomorrow.setDate(today.getDate() + 1);
    pasadoStrn.setDate(today.getDate() - 3 - 1); // -7 días - 1 para saltar hoy

    const anteStrn = pasadoStrn.toLocaleDateString('es-CL', options);

    const ayerStrn2= new Date(today);
    //tomorrow.setDate(today.getDate() + 1);
    ayerStrn2.setDate(today.getDate() - 1); //  - 1 para saltar hoy

    const ayerSt = ayerStrn2.toLocaleDateString('es-CL', options);
    
    let prompt = "";
    if (isStats) {
      prompt = `JSON ONLY. Estadísticas actuales y ranking de equipos chilenos de fútbol profesional.`;
    } else if (tab === "anteriores") {
      //prompt = `JSON ONLY. Solo partidos de fútbol profesional en CHILE de los últimos 7 días (hasta el día de ayer).`;
      prompt = `JSON ONLY. Solo partidos de fútbol profesional en CHILE de los últimos 3 días (desde el día ${anteStrn} hasta el día de ayer ${ayerSt}).`;

    } else if (tab === "siguientes") {
      prompt = `JSON ONLY. Solo partidos de fútbol profesional en CHILE desde mañana (${tomorrowStr}) durante 3 los próximos  días.`;
    } else {
      prompt = `JSON ONLY. Solo partidos de fútbol profesional en CHILE del día de hoy (${todayStr}).`;
    }

    prompt += ` Categorizar obligatoriamente por: Primera División, Segunda División y Tercera División.
    Usa status correcto: "SCHEDULED" si aún no empieza, "LIVE" si está en curso, "FINAL" si ya terminó.
    Formato exacto: {"leagues": [{"name": "...", "matches": [{"id": number, "home": "...", "away": "...", "score": "0-0", "time": "15:00", "date": "String", "status": "LIVE|FINAL|SCHEDULED", "location": "...", "city": "..."}]}]}.`;

    try {
      const response = await fetch('/api/groq', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          tools: [{ "google_search": {} }]
        })
      });

      if (response.status === 429) throw new Error("RATE_LIMIT");

      const result = await response.json();
      const rawText = result.choices?.[0]?.message?.content || "";
      const start = rawText.indexOf('{');
      const end = rawText.lastIndexOf('}');
      const jsonData = start !== -1 ? JSON.parse(rawText.substring(start, end + 1)) : null;

      if (jsonData && jsonData.leagues) {
        localStorage.setItem(cacheKey, JSON.stringify(jsonData));
        localStorage.setItem(cacheTimeKey, Date.now().toString());
        if (isStats) setStatsData(jsonData);
        else setData(jsonData);
      } else {
        setError("No se encontraron partidos para este período.");
      }
    } catch (err) {
      if (err.message === "RATE_LIMIT") {
        setError("Límite de Groq alcanzado. Espera unos minutos.");
      } else {
        setError("Error de conexión con Groq.");
      }
    } finally {
      setLoading(false);
    }
  };

  const loadData = () => fetchWithCache(selectedTab, false);
  const loadStats = () => fetchWithCache(null, true);

  const openStats = () => {
    setShowStats(true);
    if (!statsData) loadStats();
  };

  const resetToToday = () => setSelectedTab("hoy");

  useEffect(() => { loadData(); }, [selectedTab]);

  return (
    <div className="flex flex-col min-h-screen max-w-md mx-auto bg-[#020617] pb-32">
      {/* Header, tabs, main, nav y modales iguales que antes */}
      {/* (Mantengo el mismo código visual que te di en la versión anterior) */}
      {/* Solo cambié la lógica de fetchWithCache arriba */}

      {/* ... resto del código idéntico a la versión anterior ... */}
      {/* Para no hacer el mensaje demasiado largo, te confirmo que el resto es igual al index.html que te di antes */}

    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
