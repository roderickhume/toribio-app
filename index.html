<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Toribio App</title>
    
    <!-- Configuración PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5329/5329944.png">

    <!-- Librerías -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide-react"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background-color: #020617;
            user-select: none;
        }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        
        /* Efectos de App Nativa */
        .active-press:active { transform: scale(0.96); transition: transform 0.1s; }
        .glass-nav {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body class="text-white selection:bg-indigo-500">
    <div id="root"></div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log("SW Error", err));
            });
        }
    </script>

    <script type="text/javascript">
        const { useState, useEffect } = React;
        const { Calendar, ChevronDown, Bell, MapPin, RefreshCw, Download, Zap, X, ShieldCheck, User, LayoutGrid } = lucide;

        function App() {
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [showInstallGuide, setShowInstallGuide] = useState(false);
            const [lastUpdate, setLastUpdate] = useState(new Date().toLocaleTimeString());
            const [showWelcome, setShowWelcome] = useState(true);

            const handleRefresh = () => {
                if (isAiLoading) return;
                setIsAiLoading(true);
                setTimeout(() => {
                    setLastUpdate(new Date().toLocaleTimeString());
                    setIsAiLoading(false);
                }, 1500);
            };

            return React.createElement('div', { className: 'min-h-screen bg-slate-950 flex flex-col' },
                // Splash Screen
                showWelcome && React.createElement('div', { className: 'fixed inset-0 bg-indigo-600 z-[100] flex flex-col items-center justify-center p-10 text-center animate-in fade-in duration-300' },
                    React.createElement('div', { className: 'bg-white p-6 rounded-[2.5rem] text-indigo-600 shadow-2xl mb-8 active-press' }, React.createElement(ShieldCheck, { size: 64 })),
                    React.createElement('h1', { className: 'text-4xl font-black italic tracking-tighter mb-4' }, 'TORIBIO APP'),
                    React.createElement('p', { className: 'text-indigo-100 font-bold tracking-[0.3em] text-[10px] uppercase mb-16' }, 'Santiago • En Vivo'),
                    React.createElement('button', { 
                        onClick: () => setShowWelcome(false), 
                        className: 'bg-white text-indigo-600 px-14 py-5 rounded-2xl font-black uppercase text-xs shadow-2xl active-press tracking-widest' 
                    }, 'INGRESAR')
                ),

                // Header
                React.createElement('header', { className: 'sticky top-0 bg-slate-950/80 backdrop-blur-md z-40 p-5 border-b border-white/5' },
                    React.createElement('div', { className: 'max-w-xl mx-auto flex items-center justify-between' },
                        React.createElement('div', { className: 'flex items-center gap-3' },
                            React.createElement('div', { className: 'bg-indigo-600 p-2 rounded-xl' }, React.createElement(ShieldCheck, { size: 24 })),
                            React.createElement('h1', { className: 'font-black italic text-xl' }, 'TORIBIO', React.createElement('span', { className: 'text-indigo-500' }, 'APP'))
                        ),
                        React.createElement('button', { onClick: handleRefresh, className: `p-2.5 bg-slate-900 rounded-xl ${isAiLoading ? 'animate-spin' : 'active-press'}` }, 
                            React.createElement(RefreshCw, { size: 20 })
                        )
                    )
                ),

                // Main
                React.createElement('main', { className: 'flex-1 p-5 max-w-xl mx-auto w-full space-y-6 pb-44' },
                    React.createElement('div', { className: 'bg-gradient-to-br from-indigo-600 to-indigo-900 p-8 rounded-[3rem] shadow-2xl relative overflow-hidden' },
                        React.createElement('h2', { className: 'text-2xl font-black italic uppercase mb-2' }, 'Fútbol Santiago'),
                        React.createElement('p', { className: 'text-indigo-200 text-[10px] font-black uppercase tracking-widest' }, 'Actualizado: ' + lastUpdate),
                        React.createElement(Zap, { className: 'absolute -right-6 -bottom-6 text-white/10', size: 150 })
                    ),

                    ['Campeonato Nacional', 'Copa Chile', 'Eliminatorias'].map(liga => 
                        React.createElement('div', { key: liga, className: 'bg-slate-900/60 p-6 rounded-[2.5rem] border border-white/5 flex items-center justify-between active-press' },
                            React.createElement('div', { className: 'flex items-center gap-4' },
                                React.createElement('div', { className: 'w-10 h-10 bg-indigo-600/20 rounded-xl flex items-center justify-center text-indigo-400' }, React.createElement(LayoutGrid, { size: 18 })),
                                React.createElement('span', { className: 'font-black text-sm uppercase italic tracking-tight' }, liga)
                            ),
                            React.createElement(ChevronDown, { size: 18, className: 'text-slate-700' })
                        )
                    )
                ),

                // Nav
                React.createElement('div', { className: 'fixed bottom-0 left-0 right-0 p-6 flex justify-center z-50 pointer-events-none' },
                    React.createElement('nav', { className: 'glass-nav rounded-[2.5rem] py-5 px-8 flex justify-between items-center text-white shadow-2xl w-full max-w-lg pointer-events-auto' },
                        React.createElement('div', { className: 'opacity-40 active-press' }, React.createElement(Calendar, { size: 22 })),
                        React.createElement('div', { className: 'opacity-40 active-press' }, React.createElement(LayoutGrid, { size: 22 })),
                        React.createElement('div', { 
                            onClick: () => setShowInstallGuide(true), 
                            className: 'bg-indigo-600 p-4 rounded-[1.5rem] -mt-16 border-[6px] border-slate-950 shadow-xl active-press' 
                        }, React.createElement(Download, { size: 24 })),
                        React.createElement('div', { className: 'opacity-40 active-press' }, React.createElement(Bell, { size: 22 })),
                        React.createElement('div', { className: 'opacity-40 active-press' }, React.createElement(User, { size: 22 }))
                    )
                ),

                // Modal
                showInstallGuide && React.createElement('div', { className: 'fixed inset-0 bg-black/90 z-[110] flex items-end p-4 safe-bottom' },
                    React.createElement('div', { className: 'bg-white text-slate-900 w-full p-10 rounded-[3.5rem] animate-in slide-in-from-bottom duration-300' },
                        React.createElement('h2', { className: 'text-2xl font-black italic uppercase mb-4' }, 'Instalar en tu móvil'),
                        React.createElement('p', { className: 'text-slate-500 text-sm mb-8 font-medium' }, 'Pulsa el botón de compartir y selecciona "Añadir a pantalla de inicio".'),
                        React.createElement('button', { onClick: () => setShowInstallGuide(false), className: 'w-full py-5 bg-indigo-600 text-white rounded-[1.5rem] font-black uppercase text-[10px] tracking-widest' }, 'ENTENDIDO')
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
