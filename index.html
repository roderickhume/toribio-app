<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Toribio App</title>
    
    <!-- PWA: Manifiesto Inline -->
    <link rel="manifest" href='data:application/json,{"name":"Toribio App","short_name":"Toribio","start_url":".","display":"standalone","background_color":"#0f172a","theme_color":"#4f46e5","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/5329/5329944.png","sizes":"512x512","type":"image/png","purpose":"any maskable"}]}'>
    
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5329/5329944.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide-react"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-slate-950 text-white">
    <div id="root"></div>

    <script>
        // Service Worker Inline para permitir instalación PWA sin archivos extra
        if ('serviceWorker' in navigator) {
            const swCode = "self.addEventListener('fetch', (event) => { event.respondWith(fetch(event.request)); });";
            const blob = new Blob([swCode], {type: 'text/javascript'});
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl);
        }
    </script>

    <script type="text/javascript">
        const { useState, useMemo } = React;
        const { Search, Calendar, ChevronDown, Bell, Trophy, MapPin, RefreshCw, Download, Zap, X, ShieldCheck, Share, PlusSquare, MoreVertical, User, LayoutGrid } = lucide;

        function App() {
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [showInstallGuide, setShowInstallGuide] = useState(false);
            const [lastUpdate, setLastUpdate] = useState(new Date().toLocaleTimeString());
            const [showWelcome, setShowWelcome] = useState(true);

            const handleRefresh = () => {
                if (isAiLoading) return;
                setIsAiLoading(true);
                setTimeout(() => {
                    setLastUpdate(new Date().toLocaleTimeString());
                    setIsAiLoading(false);
                }, 1500);
            };

            return React.createElement('div', { className: 'min-h-screen bg-slate-950 flex flex-col' },
                // Splash Screen (Bienvenida)
                showWelcome && React.createElement('div', { className: 'fixed inset-0 bg-indigo-600 z-[100] flex flex-col items-center justify-center p-10 text-center' },
                    React.createElement(ShieldCheck, { size: 80, className: 'mb-6 text-white' }),
                    React.createElement('h1', { className: 'text-4xl font-black italic mb-2 tracking-tighter' }, 'TORIBIO APP'),
                    React.createElement('div', { className: 'flex items-center gap-2 mb-12' },
                        React.createElement('div', { className: 'w-2 h-2 bg-green-400 rounded-full animate-pulse' }),
                        React.createElement('p', { className: 'text-indigo-100 font-bold tracking-widest text-[10px] uppercase' }, 'Santiago • Modo Realtime')
                    ),
                    React.createElement('button', { 
                        onClick: () => setShowWelcome(false), 
                        className: 'bg-white text-indigo-600 px-12 py-4 rounded-2xl font-black uppercase text-xs shadow-2xl active:scale-95 transition-all' 
                    }, 'COMENZAR')
                ),

                // Header Profesional
                React.createElement('header', { className: 'sticky top-0 bg-slate-900/80 backdrop-blur-xl border-b border-white/10 z-40 p-5' },
                    React.createElement('div', { className: 'max-w-xl mx-auto flex items-center justify-between' },
                        React.createElement('div', { className: 'flex items-center gap-3' },
                            React.createElement('div', { className: 'bg-indigo-600 p-2.5 rounded-xl shadow-lg' }, React.createElement(ShieldCheck, { size: 24 })),
                            React.createElement('div', null,
                                React.createElement('h1', { className: 'font-black italic text-xl leading-none' }, 'TORIBIO', React.createElement('span', { className: 'text-indigo-500' }, 'APP')),
                                React.createElement('p', { className: 'text-[9px] font-black text-slate-500 mt-1 uppercase tracking-widest' }, 'Sinc: ' + lastUpdate)
                            )
                        ),
                        React.createElement('button', { 
                            onClick: handleRefresh, 
                            className: `p-3 bg-slate-800 rounded-xl active:scale-90 transition-all ${isAiLoading ? 'animate-spin opacity-50' : ''}` 
                        }, React.createElement(RefreshCw, { size: 20 }))
                    )
                ),

                // Contenido Principal
                React.createElement('main', { className: 'flex-1 p-5 max-w-xl mx-auto w-full space-y-6 pb-40' },
                    // Banner Local
                    React.createElement('div', { className: 'bg-gradient-to-br from-indigo-900 to-slate-900 p-8 rounded-[2.5rem] border border-white/5 relative overflow-hidden shadow-2xl' },
                        React.createElement('div', { className: 'relative z-10' },
                            React.createElement('div', { className: 'flex items-center gap-2 mb-2' },
                                React.createElement(MapPin, { size: 12, className: 'text-indigo-400' }),
                                React.createElement('span', { className: 'text-[9px] font-black uppercase tracking-widest text-indigo-400' }, 'Santiago, Chile')
                            ),
                            React.createElement('h2', { className: 'text-2xl font-black mb-2 italic uppercase tracking-tighter' }, 'Torneo Nacional'),
                            React.createElement('p', { className: 'text-indigo-300 text-xs font-medium max-w-[70%]' }, 'Analizando datos en tiempo real para tu zona.')
                        ),
                        React.createElement(Zap, { className: 'absolute -right-10 -bottom-10 text-indigo-500/10', size: 180 })
                    ),

                    // Lista de Ligas
                    ['Campeonato Nacional', 'LaLiga', 'Premier League', 'Champions League'].map(liga => 
                        React.createElement('div', { key: liga, className: 'bg-slate-900 p-6 rounded-[2.2rem] border border-white/5 flex items-center justify-between active:bg-slate-800 transition-colors' },
                            React.createElement('div', { className: 'flex items-center gap-4' },
                                React.createElement('div', { className: 'w-11 h-11 bg-slate-800 rounded-2xl flex items-center justify-center font-black text-xs border border-white/5 shadow-inner' }, liga.slice(0,2).toUpperCase()),
                                React.createElement('div', null,
                                    React.createElement('span', { className: 'font-black text-sm block tracking-tight uppercase italic' }, liga),
                                    React.createElement('span', { className: 'text-[9px] text-slate-500 font-bold uppercase tracking-widest' }, 'Resultados Hoy')
                                )
                            ),
                            React.createElement(ChevronDown, { size: 20, className: 'text-slate-700' })
                        )
                    )
                ),

                // Barra Flotante Multitouch
                React.createElement('div', { className: 'fixed bottom-0 left-0 right-0 p-6 flex justify-center z-50 pointer-events-none' },
                    React.createElement('nav', { className: 'bg-slate-900/95 backdrop-blur-3xl rounded-[2.5rem] py-5 px-8 flex justify-between items-center text-white shadow-2xl border border-white/10 w-full max-w-lg pointer-events-auto' },
                        React.createElement('div', { className: 'flex flex-col items-center opacity-30 active:opacity-100 transition-opacity' }, React.createElement(Calendar, { size: 22 }), React.createElement('span', { className: 'text-[7px] font-black uppercase mt-1 tracking-widest' }, 'Live')),
                        React.createElement('div', { className: 'flex flex-col items-center opacity-30 active:opacity-100 transition-opacity' }, React.createElement(LayoutGrid, { size: 22 }), React.createElement('span', { className: 'text-[7px] font-black uppercase mt-1 tracking-widest' }, 'Ligas')),
                        React.createElement('div', { 
                            onClick: () => setShowInstallGuide(true), 
                            className: 'bg-indigo-600 p-4.5 rounded-[1.5rem] text-white -mt-14 shadow-2xl shadow-indigo-500/40 active:scale-90 transition-all border-4 border-slate-950 cursor-pointer' 
                        }, React.createElement(Download, { size: 26 })),
                        React.createElement('div', { className: 'flex flex-col items-center opacity-30 active:opacity-100 transition-opacity' }, React.createElement(Bell, { size: 22 }), React.createElement('span', { className: 'text-[7px] font-black uppercase mt-1 tracking-widest' }, 'Alert')),
                        React.createElement('div', { className: 'flex flex-col items-center opacity-30 active:opacity-100 transition-opacity' }, React.createElement(User, { size: 22 }), React.createElement('span', { className: 'text-[7px] font-black uppercase mt-1 tracking-widest' }, 'User'))
                    )
                ),

                // Modal de Instalación PWA
                showInstallGuide && React.createElement('div', { className: 'fixed inset-0 bg-black/95 z-[110] flex items-end p-5 safe-bottom' },
                    React.createElement('div', { className: 'bg-white text-slate-900 w-full p-10 rounded-[3rem] shadow-2xl' },
                        React.createElement('div', { className: 'flex justify-between items-start mb-8' },
                            React.createElement('div', { className: 'bg-indigo-600 p-4 rounded-2xl' }, React.createElement(Download, { className: 'text-white', size: 28 })),
                            React.createElement('button', { onClick: () => setShowInstallGuide(false), className: 'p-2' }, React.createElement(X, { size: 24 }))
                        ),
                        React.createElement('h2', { className: 'text-3xl font-black mb-4 tracking-tighter italic uppercase' }, 'Toribio App'),
                        React.createElement('p', { className: 'text-slate-500 text-sm mb-10 leading-relaxed font-medium' }, 'Para instalar, pulsa el botón de compartir y selecciona "Añadir a la pantalla de inicio".'),
                        React.createElement('button', { 
                            onClick: () => setShowInstallGuide(false), 
                            className: 'w-full py-5 bg-indigo-600 text-white rounded-[1.5rem] font-black uppercase text-xs tracking-widest active:scale-95 transition-all' 
                        }, '¡ENTENDIDO!')
                    )
                )
            );
        }

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(React.createElement(App));
    </script>
</body>
</html>
