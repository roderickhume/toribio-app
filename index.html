<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Toribio App | Fútbol Chileno</title>
    
    <style>
        :root {
            --bg: #020617;
            --primary: #4f46e5;
            --card: #1e293b;
            --accent: #10b981;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: white;
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; flex-direction: column; min-height: 100vh;
        }

        header {
            padding: 20px; background: rgba(2, 6, 23, 0.95);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }

        .logo { font-weight: 900; font-style: italic; font-size: 1.2rem; }
        .logo span { color: var(--primary); }

        main { padding: 20px; flex: 1; max-width: 600px; margin: 0 auto; width: 100%; }

        .hero {
            background: linear-gradient(135deg, #4f46e5, #3730a3);
            padding: 30px; border-radius: 30px; margin-bottom: 25px;
            position: relative; overflow: hidden;
        }

        .hero h1 { margin: 0; font-size: 1.5rem; font-weight: 900; font-style: italic; text-transform: uppercase; }

        .btn-update {
            background: white; color: var(--primary); border: none;
            padding: 12px 20px; border-radius: 15px; font-weight: 900;
            font-size: 0.7rem; margin-top: 15px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .section-title {
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px;
            color: var(--text-dim); margin: 20px 0 15px 0; display: block; font-weight: 900;
        }

        .match-card {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 20px; border-radius: 25px; margin-bottom: 12px;
        }

        .match-data { font-size: 0.9rem; line-height: 1.6; }
        .match-data b { color: var(--accent); }

        .loading-overlay {
            position: fixed; inset: 0; background: rgba(2,6,23,0.8);
            display: none; flex-direction: column; align-items: center;
            justify-content: center; z-index: 200; backdrop-filter: blur(5px);
        }

        .spinner {
            width: 40px; height: 40px; border: 4px solid #1e293b;
            border-top-color: var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        nav {
            background: #0f172a; padding: 15px 30px; display: flex;
            justify-content: space-around; position: sticky; bottom: 0;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .nav-link { color: var(--text-dim); text-decoration: none; font-size: 0.6rem; font-weight: 900; }
        .nav-link.active { color: var(--primary); }

        .source-link { font-size: 0.6rem; color: var(--text-dim); margin-top: 10px; display: block; text-decoration: none; }
    </style>
</head>
<body>

    <div id="loader" class="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top: 15px; font-weight: 800; font-size: 0.7rem; letter-spacing: 2px;">BUSCANDO GOLES...</p>
    </div>

    <header>
        <div class="logo">TORIBIO<span>APP</span></div>
        <div style="width: 10px; height: 10px; background: #10b981; border-radius: 50%;"></div>
    </header>

    <main>
        <div class="hero">
            <h1>Santiago, Chile</h1>
            <p id="current-date" style="font-size: 0.7rem; opacity: 0.7; margin: 5px 0 15px 0;"></p>
            <button class="btn-update" onclick="updateFootballData()">Actualizar Resultados</button>
        </div>

        <span class="section-title">Resultados Campeonato Nacional</span>
        <div id="results-container">
            <div class="match-card" style="text-align: center; color: var(--text-dim);">
                Pulsa el botón de arriba para ver los últimos resultados reales del fútbol chileno.
            </div>
        </div>
    </main>

    <nav>
        <a href="#" class="nav-link active">INICIO</a>
        <a href="#" class="nav-link">TABLA</a>
        <a href="#" class="nav-link">CALENDARIO</a>
    </nav>

    <script>
        const apiKey = ""; // La API key se inyecta automáticamente en el entorno de ejecución

        async function updateFootballData() {
            const loader = document.getElementById('loader');
            const container = document.getElementById('results-container');
            loader.style.display = 'flex';

            const userQuery = "resultados fecha actual campeonato nacional chile futbol hoy";
            const systemPrompt = "Eres un experto en deportes. Extrae los resultados de los partidos jugados hoy o en la última fecha del Campeonato Nacional de Chile. Presenta los datos de forma limpia: Equipo Local vs Equipo Visitante y el Marcador. Sé breve.";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userQuery }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        tools: [{ "google_search": {} }]
                    })
                });

                const result = await response.json();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text || "No se encontraron resultados recientes.";
                const sources = result.candidates?.[0]?.groundingMetadata?.groundingAttributions?.map(a => ({ uri: a.web?.uri, title: a.web?.title })) || [];

                // Formatear el texto para que se vea como cards
                const formattedText = text.replace(/\n/g, '<br>');
                
                container.innerHTML = `
                    <div class="match-card">
                        <div class="match-data">${formattedText}</div>
                        ${sources.length > 0 ? `<a href="${sources[0].uri}" target="_blank" class="source-link">Fuente: ${sources[0].title}</a>` : ''}
                    </div>
                `;

            } catch (error) {
                console.error(error);
                container.innerHTML = '<div class="match-card" style="color: #ef4444;">Error al conectar con el servidor de búsqueda. Inténtalo de nuevo.</div>';
            } finally {
                loader.style.display = 'none';
            }
        }

        document.getElementById('current-date').innerText = new Date().toLocaleDateString('es-CL', { weekday: 'long', day: 'numeric', month: 'long' });
    </script>

</body>
</html>
